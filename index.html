<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trực Tuyến - Thầy Hùng Anh</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f8fafc; --text: #0f172a; --border: #cbd5e1; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 700px; border-top: 6px solid var(--primary); }
        h2 { margin-top: 0; color: var(--primary); font-size: 24px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #475569; }
        input[type="text"], input[type="password"] { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 14px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn-primary:hover { background: var(--primary-hover); }
        
        /* Quiz UI */
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; font-weight: bold; }
        .question-title { font-size: 18px; line-height: 1.6; margin-bottom: 25px; }
        
        /* Multiple Choice */
        .mcq-option { display: block; width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid var(--border); border-radius: 8px; background: white; cursor: pointer; text-align: left; font-size: 16px; transition: 0.2s; }
        .mcq-option:hover { border-color: #94a3b8; background: #f1f5f9; }
        .mcq-option.selected { border-color: var(--primary); background: #eff6ff; font-weight: bold; }
        
        /* True/False */
        .tf-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .tf-table th, .tf-table td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        .tf-table td.statement { text-align: left; width: 70%; }
        .tf-radio { transform: scale(1.5); cursor: pointer; }

        /* Short Answer */
        .short-answer-input { width: 100%; max-width: 300px; text-align: center; font-size: 18px; font-weight: bold; color: var(--primary); }

        #quiz-screen, #result-screen { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen" style="text-align: center;">
            <h2>LeHoang Education</h2>
            <p style="color: #64748b; margin-bottom: 30px;">Hệ thống kiểm tra năng lực môn Toán</p>
            
            <div class="form-group">
                <label>Họ và Tên học sinh</label>
                <input type="text" id="studentName" placeholder="Ví dụ: Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label>Mã phòng thi (Mã code)</label>
                <input type="password" id="accessCode" placeholder="Nhập mã do giáo viên cung cấp">
            </div>
            <button class="btn-primary" onclick="startQuiz()">VÀO PHÒNG THI</button>
        </div>

        <div id="quiz-screen">
            <div class="header-bar">
                <span id="display-name" style="color: var(--primary);"></span>
                <span id="question-count" style="background: #e2e8f0; padding: 4px 12px; border-radius: 20px;"></span>
            </div>
            
            <div id="question-text" class="question-title"></div>
            
            <div id="interactive-area" style="margin-bottom: 30px;"></div>
            
            <button class="btn-primary" onclick="submitAnswer()" id="btn-next">CÂU TIẾP THEO ➔</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #16a34a; font-size: 32px;">✓ ĐÃ NỘP BÀI</h2>
            <p style="font-size: 18px; margin-top: 20px;">Học sinh: <strong id="result-name"></strong></p>
            <div style="background: #f8fafc; border: 2px dashed #cbd5e1; padding: 30px; border-radius: 12px; margin: 30px 0;">
                <p style="margin: 0; color: #64748b; font-size: 16px;">Tổng điểm đạt được:</p>
                <strong id="score-text" style="color: var(--primary); font-size: 48px;"></strong>
            </div>
            <p style="color: #64748b; font-size: 14px;">Kết quả chi tiết đã được gửi về hệ thống của giáo viên.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            projectId: "phamhunganhquiz",
            storageBucket: "phamhunganhquiz.firebasestorage.app",
            messagingSenderId: "948379693019",
            appId: "1:948379693019:web:a9acf119254d237018c1fe"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ==========================================
        // CÀI ĐẶT MÃ PHÒNG THI VÀ ĐỀ BÀI Ở ĐÂY
        // ==========================================
        const CORRECT_PASSCODE = "TOAN2026"; // Thầy có thể đổi mã code tại đây

        const questions = [
            // DẠNG 1: TRẮC NGHIỆM (mcq)
            { 
                type: "mcq",
                q: "PHẦN I. Câu trắc nghiệm nhiều phương án lựa chọn.<br><br>Tính đạo hàm của hàm số \\( y = e^{2x} \\).", 
                a: ["A. \\( y' = e^{2x} \\)", "B. \\( y' = 2e^{2x} \\)", "C. \\( y' = \\frac{1}{2}e^{2x} \\)", "D. \\( y' = 2xe^{2x} \\)"], 
                correct: 1 // Đáp án B
            },
            
            // DẠNG 2: ĐÚNG/SAI (tf) - Giống cấu trúc đề 2025
            {
                type: "tf",
                q: "PHẦN II. Câu trắc nghiệm đúng sai.<br><br>Cho hàm số \\( y = x^3 - 3x + 2 \\). Các mệnh đề sau đúng hay sai?",
                statements: [
                    { text: "Hàm số đồng biến trên khoảng \\( (1; +\\infty) \\).", isTrue: true },
                    { text: "Hàm số đạt cực đại tại \\( x = 1 \\).", isTrue: false },
                    { text: "Đồ thị hàm số cắt trục tung tại điểm có tung độ bằng 2.", isTrue: true },
                    { text: "Giá trị nhỏ nhất của hàm số trên đoạn \\( [0; 2] \\) bằng 0.", isTrue: true }
                ]
            },

            // DẠNG 3: TRẢ LỜI NGẮN (short)
            {
                type: "short",
                q: "PHẦN III. Câu trắc nghiệm trả lời ngắn.<br><br>Tìm giá trị lớn nhất của hàm số \\( f(x) = -x^2 + 4x + 1 \\).",
                correct: "5" // Học sinh phải gõ đúng số 5
            }
        ];

        let currentQ = 0, score = 0, studentName = "", cheatCount = 0;
        let selectedMcq = null; // Lưu đáp án trắc nghiệm tạm thời

        window.startQuiz = () => {
            studentName = document.getElementById("studentName").value.trim();
            const code = document.getElementById("accessCode").value.trim();
            
            if (!studentName) return alert("Em vui lòng nhập Họ và Tên!");
            if (code !== CORRECT_PASSCODE) return alert("Mã phòng thi không chính xác!");
            
            const studentRef = ref(db, 'students/' + studentName);
            set(studentRef, { status: "Đang làm", question: 1, cheats: 0, score: 0 });
            onDisconnect(studentRef).update({ status: "Mất mạng/Thoát" });

            document.getElementById("login-screen").style.display = "none";
            document.getElementById("quiz-screen").style.display = "block";
            document.getElementById("display-name").innerText = `Thí sinh: ${studentName}`;
            renderQuestion();
        };

        function renderQuestion() {
            const qData = questions[currentQ];
            document.getElementById("question-count").innerText = `Câu ${currentQ + 1}/${questions.length}`;
            document.getElementById("question-text").innerHTML = qData.q;
            
            let html = "";
            
            // Xây dựng giao diện dựa theo loại câu hỏi
            if (qData.type === "mcq") {
                selectedMcq = null;
                qData.a.forEach((ans, i) => {
                    html += `<button class="mcq-option" id="mcq-${i}" onclick="selectMcq(${i})">${ans}</button>`;
                });
            } 
            else if (qData.type === "tf") {
                html += `<table class="tf-table">
                            <tr><th>Phát biểu</th><th>Đúng</th><th>Sai</th></tr>`;
                qData.statements.forEach((stmt, i) => {
                    html += `<tr>
                                <td class="statement">${stmt.text}</td>
                                <td><input type="radio" name="tf-${i}" value="true" class="tf-radio"></td>
                                <td><input type="radio" name="tf-${i}" value="false" class="tf-radio"></td>
                             </tr>`;
                });
                html += `</table>`;
            } 
            else if (qData.type === "short") {
                html += `<div style="text-align: center; margin-top: 20px;">
                            <input type="text" id="short-answer" class="short-answer-input" placeholder="Nhập đáp án vào đây...">
                         </div>`;
            }

            document.getElementById("interactive-area").innerHTML = html;
            
            if (currentQ === questions.length - 1) {
                document.getElementById("btn-next").innerText = "NỘP BÀI TỔNG KẾT";
                document.getElementById("btn-next").style.backgroundColor = "#16a34a"; // Đổi màu xanh lá
            }

            if (window.MathJax) MathJax.typesetPromise();
            update(ref(db, 'students/' + studentName), { question: currentQ + 1 });
        }

        // Chọn đáp án cho câu Trắc nghiệm
        window.selectMcq = (index) => {
            selectedMcq = index;
            document.querySelectorAll('.mcq-option').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`mcq-${index}`).classList.add('selected');
        };

        // Hàm xử lý khi bấm "CÂU TIẾP THEO"
        window.submitAnswer = () => {
            const qData = questions[currentQ];
            let isAnswered = false;

            // Kiểm tra & Tính điểm
            if (qData.type === "mcq") {
                if (selectedMcq === null) return alert("Em chưa chọn đáp án!");
                if (selectedMcq === qData.correct) score++;
                isAnswered = true;
            } 
            else if (qData.type === "tf") {
                let allChecked = true;
                let tfScore = 0;
                qData.statements.forEach((stmt, i) => {
                    const checkedNode = document.querySelector(`input[name="tf-${i}"]:checked`);
                    if (!checkedNode) allChecked = false;
                    else if (checkedNode.value === stmt.isTrue.toString()) tfScore += 0.25; // Mỗi ý đúng 0.25 điểm
                });
                if (!allChecked) return alert("Em phải chọn Đúng hoặc Sai cho TẤT CẢ các phát biểu!");
                score += tfScore;
                isAnswered = true;
            } 
            else if (qData.type === "short") {
                const studentAns = document.getElementById("short-answer").value.trim().toLowerCase();
                if (studentAns === "") return alert("Em chưa nhập đáp án!");
                // So sánh chuỗi (có thể nhập 5 hoặc 5.0 tuỳ cấu hình của thầy)
                if (studentAns === qData.correct.toLowerCase()) score++; 
                isAnswered = true;
            }

            if (isAnswered) {
                currentQ++;
                if (currentQ < questions.length) renderQuestion();
                else finishQuiz();
            }
        };

        function finishQuiz() {
            update(ref(db, 'students/' + studentName), { status: "Hoàn thành", score: score });
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("result-name").innerText = studentName;
            document.getElementById("score-text").innerText = score;
        }

        // CHỐNG GIAN LẬN
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && studentName && document.getElementById("quiz-screen").style.display === "block") {
                cheatCount++;
                update(ref(db, 'students/' + studentName), { cheats: cheatCount });
                alert(`CẢNH BÁO: Em vừa thoát màn hình! Vi phạm: ${cheatCount}/3 lần`);
                if(cheatCount >= 3) {
                    alert("Vi phạm 3 lần. Hệ thống tự động thu bài!");
                    finishQuiz();
                }
            }
        });
    </script>
</body>
</html>
