<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp toán thầy Hùng Anh - LeHoang Education</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #0f172a; --border: #cbd5e1; }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 750px; border-top: 8px solid var(--primary); margin-top: 20px; }
        .screen { display: none; } .active { display: block; }
        
        #screen-login h1 { color: var(--primary); margin-bottom: 5px; font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        #screen-login h2 { color: #64748b; font-size: 18px; margin-bottom: 40px; font-weight: 500; }
        
        input, select { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; background: #f8fafc; }
        
        .btn { padding: 16px; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; margin-bottom: 12px; color: white; transition: 0.3s; text-align: center; }
        .btn-blue { background: #2563eb; width: 100%; } 
        .btn-green { background: #10b981; width: 100%; } 
        .btn-gray { background: #475569; width: 100%; }
        
        .nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-nav { flex: 1; background: #64748b; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-submit { flex: 1; background: #ef4444; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }

        .question-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
        .q-box { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; background: #f8fafc; }
        .q-box.answered { background: var(--primary); color: white; border-color: var(--primary); }
        .q-box.current { border: 2px solid var(--text); background: #e2e8f0; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; font-weight: bold; }
        .question-text { font-size: 19px; line-height: 1.6; margin-bottom: 30px; min-height: 80px; }
        .mcq-option { display: block; width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid var(--border); border-radius: 10px; background: white; cursor: pointer; text-align: left; font-size: 17px; }
        .mcq-option.selected { border-color: var(--primary); background: #eff6ff; font-weight: bold; box-shadow: 0 0 0 2px var(--primary); }
        
        .tf-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .tf-table th, .tf-table td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        .review-box { text-align: left; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 25px; margin-bottom: 20px; }
        .explanation-box { background: #dcfce7; border-left: 5px solid #16a34a; padding: 15px; margin-top: 15px; border-radius: 0 8px 8px 0; font-size: 15px; }
        .history-card { border: 1px solid var(--border); padding: 18px; border-radius: 10px; margin-bottom: 15px; background: white; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <div id="screen-login" class="screen active" style="text-align: center;">
            <h1>Lớp toán thầy Hùng Anh</h1>
            <h2>LeHoang Education</h2>
            <input type="text" id="loginUser" placeholder="Tên đăng nhập">
            <input type="password" id="loginPass" placeholder="Mật khẩu">
            <button class="btn btn-blue" onclick="handleLogin()">BẮT ĐẦU HỌC TẬP</button>
        </div>

        <div id="screen-dashboard" class="screen" style="text-align: center;">
            <h2 id="welcome-text"></h2>
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="font-weight: bold; color: var(--primary);">Chọn Đề kiểm tra/Luyện tập:</label>
                <select id="examPicker"></select>
            </div>
            <button class="btn btn-blue" onclick="startMode('exam')">🔴 VÀO PHÒNG THI CHÍNH THỨC</button>
            <button class="btn btn-green" onclick="startMode('practice')">🟢 TỰ LUYỆN TẬP CUỐI GIỜ</button>
            <button class="btn btn-gray" onclick="viewHistory()">🕒 XEM LỊCH SỬ BÀI LÀM</button>
            <button class="btn" style="background:#e2e8f0; color:#475569;" onclick="location.reload()">Đăng xuất</button>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="header-bar"><span id="quiz-title"></span><span id="question-count"></span></div>
            <div id="question-text" class="question-text"></div>
            <div id="interactive-area"></div>
            
            <div class="nav-buttons">
                <button class="btn-nav" id="btn-prev" onclick="changeQuestion(-1)">⬅ Câu trước</button>
                <button class="btn-nav" id="btn-next" onclick="changeQuestion(1)">Câu tiếp ➡</button>
                <button class="btn-submit" onclick="confirmFinish()">NỘP BÀI</button>
            </div>
            <div id="question-grid" class="question-grid"></div>
        </div>

        <div id="screen-result" class="screen">
            <h2 id="res-head" style="text-align:center; color:#16a34a;">✓ HOÀN THÀNH</h2>
            <div style="text-align:center; background:#f8fafc; border:2px dashed var(--primary); padding:25px; border-radius:15px; margin:25px 0;">
                <p>Điểm của em (Thang 10):</p>
                <strong id="score-text" style="font-size:50px; color:var(--primary);"></strong>
            </div>
            <div id="review-area"></div>
            <button class="btn btn-blue" onclick="showScreen('screen-dashboard')">TRỞ VỀ MENU CHÍNH</button>
        </div>

        <div id="screen-history" class="screen">
            <h2 style="color:var(--primary); text-align:left;">Lịch sử bài làm</h2>
            <div id="history-content"></div>
            <button class="btn btn-gray" onclick="showScreen('screen-dashboard')">QUAY LẠI</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            databaseURL: "https://phamhunganhquiz-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phamhunganhquiz",
            appId: "1:948379693019:web:a9acf119254d237018c1fe"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // KHO ĐỀ MẪU ĐA DẠNG (Thầy thêm đề tại đây)
        const allExams = {
            "Đề số 1": [
                { type: "mcq", q: "Tính đạo hàm \\( y = e^{2x} \\):", a: ["\\( e^{2x} \\)", "\\( 2e^{2x} \\)", "Khác"], correct: 1, explanation: "\\( (e^u)' = u'e^u \\)." }
            ],
            "Đề số 2": [
                { type: "mcq", q: "Tìm x biết \\( x + 1 = 2 \\)", a: ["0", "1", "2"], correct: 1, explanation: "Phép cộng cơ bản." },
                { type: "tf", q: "Hàm số \\( y = x^2 \\) là hàm số chẵn?", statements: [{text: "Đúng", isTrue: true}, {text: "Sai", isTrue: false}], explanation: "\\( f(-x)=f(x) \\)." },
                { type: "short", q: "Căn bậc hai của 9 là?", correct: "3", explanation: "3x3=9" }
            ]
        };

        let currentUser = null, currentMode = "", questions = [], currentIdx = 0, cheatCount = 0;
        let userAnswers = {}; 
        let tempHistoryList = []; // Biến tạm lưu lịch sử để tránh lỗi JSON

        const picker = document.getElementById("examPicker");
        Object.keys(allExams).forEach(name => {
            let opt = document.createElement("option"); opt.value = name; opt.innerText = name; picker.appendChild(opt);
        });

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(window.MathJax) MathJax.typesetPromise();
        };

        window.handleLogin = async () => {
            const u = document.getElementById("loginUser").value.trim().toLowerCase();
            const p = document.getElementById("loginPass").value.trim();
            const snap = await get(ref(db, 'accounts/' + u));
            if(snap.exists() && snap.val().password === p) {
                currentUser = { username: u, fullName: snap.val().fullName };
                document.getElementById("welcome-text").innerText = `Chào em, ${currentUser.fullName}!`;
                update(ref(db, 'students/' + currentUser.fullName), { status_online: "Trực tuyến" });
                onDisconnect(ref(db, 'students/' + currentUser.fullName)).update({ status_online: "Ngoại tuyến" });
                showScreen('screen-dashboard');
            } else alert("Sai thông tin đăng nhập!");
        };

        window.startMode = (mode) => {
            currentMode = mode;
            questions = allExams[picker.value];
            if(mode === 'exam' && prompt("Mã phòng thi:") !== "TOAN2026") return;
            currentIdx = 0; userAnswers = {}; cheatCount = 0;
            // Khởi tạo trạng thái đề cho Giáo viên
            if(mode === 'exam') update(ref(db, `students/${currentUser.fullName}`), { examName: picker.value, totalQ: questions.length, status: "Đang làm", score: 0 });
            showScreen('screen-quiz');
            renderQuestion();
            renderGrid();
        };

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && currentMode === 'exam' && document.getElementById('screen-quiz').classList.contains('active')) {
                cheatCount++;
                update(ref(db, `students/${currentUser.fullName}`), { cheats: cheatCount });
                if (cheatCount >= 2) { finish(); alert("Tự động nộp bài do thoát tab!"); }
                else alert(`Cảnh báo lần ${cheatCount}/2: Không được thoát tab!`);
            }
        });

        function renderGrid() {
            const grid = document.getElementById("question-grid");
            grid.innerHTML = "";
            questions.forEach((_, i) => {
                const box = document.createElement("div");
                box.className = "q-box";
                if (i === currentIdx) box.classList.add("current");
                if (userAnswers[i] !== undefined) box.classList.add("answered");
                box.innerText = i + 1;
                box.onclick = () => { currentIdx = i; renderQuestion(); renderGrid(); };
                grid.appendChild(box);
            });
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            document.getElementById("quiz-title").innerText = picker.value;
            document.getElementById("question-count").innerText = `Câu ${currentIdx + 1}/${questions.length}`;
            document.getElementById("question-text").innerHTML = q.q;
            
            let html = "";
            const savedAns = userAnswers[currentIdx];

            if(q.type === "mcq") {
                q.a.forEach((ans, i) => {
                    const selClass = savedAns === i ? "selected" : "";
                    html += `<button class="mcq-option ${selClass}" onclick="saveAns(${i})">${ans}</button>`;
                });
            } else if(q.type === "tf") {
                html += `<table class="tf-table"><tr><th>Mệnh đề</th><th>Đ</th><th>S</th></tr>`;
                q.statements.forEach((s, i) => {
                    const dChecked = (savedAns && savedAns[i] === "true") ? "checked" : "";
                    const sChecked = (savedAns && savedAns[i] === "false") ? "checked" : "";
                    html += `<tr><td style="text-align:left;">${s.text}</td>
                             <td><input type="radio" name="tf-${i}" value="true" ${dChecked} onchange="saveTF(${i}, 'true')"></td>
                             <td><input type="radio" name="tf-${i}" value="false" ${sChecked} onchange="saveTF(${i}, 'false')"></td></tr>`;
                });
                html += `</table>`;
            } else {
                const val = savedAns || "";
                html = `<input type="text" id="short-ans" value="${val}" style="text-align:center; font-weight:bold;" placeholder="Gõ đáp án..." oninput="saveShort(this.value)">`;
            }
            document.getElementById("interactive-area").innerHTML = html;
            if(window.MathJax) MathJax.typesetPromise();
        }

        window.saveAns = (i) => { userAnswers[currentIdx] = i; syncToTeacher(); renderQuestion(); renderGrid(); };
        window.saveShort = (val) => { userAnswers[currentIdx] = val.trim(); syncToTeacher(); renderGrid(); };
        window.saveTF = (stIdx, val) => {
            if (!userAnswers[currentIdx]) userAnswers[currentIdx] = {};
            userAnswers[currentIdx][stIdx] = val;
            syncToTeacher(); renderGrid();
        };

        // Gửi kết quả tạm thời cho Giáo viên
        function syncToTeacher() {
            if (currentMode !== 'exam') return;
            let currentScore = 0;
            let tempDetails = [];
            const countMCQ = questions.filter(q => q.type === 'mcq').length || 1;
            const countTF = questions.filter(q => q.type === 'tf').length || 1;
            const countShort = questions.filter(q => q.type === 'short').length || 1;

            questions.forEach((q, i) => {
                let earned = 0;
                const uVal = userAnswers[i];
                if (q.type === "mcq" && uVal === q.correct) earned = 5 / countMCQ;
                else if (q.type === "tf") {
                    let cp = 0;
                    q.statements.forEach((st, sIdx) => { if (uVal && uVal[sIdx] === st.isTrue.toString()) cp++; });
                    earned = (cp / q.statements.length) * (3 / countTF);
                } else if (q.type === "short" && uVal && uVal.toLowerCase() === q.correct.toLowerCase()) {
                    earned = 2 / countShort;
                }
                currentScore += earned;
                tempDetails.push({ earned, sAns: uVal || "?" });
            });
            update(ref(db, `students/${currentUser.fullName}`), { score: currentScore.toFixed(2), detailAnswers: tempDetails });
        }

        window.changeQuestion = (step) => {
            let next = currentIdx + step;
            if (next >= 0 && next < questions.length) { currentIdx = next; renderQuestion(); renderGrid(); }
        };

        window.confirmFinish = () => { if (confirm("Em chắc chắn muốn nộp bài?")) finish(); };

        function finish() {
            let rawScore = 0, historyArr = [];
            const countMCQ = questions.filter(i => i.type === 'mcq').length || 1;
            const countTF = questions.filter(i => i.type === 'tf').length || 1;
            const countShort = questions.filter(i => i.type === 'short').length || 1;

            questions.forEach((q, i) => {
                let earned = 0, sAnsText = "", cAnsText = "";
                const userVal = userAnswers[i];
                if (q.type === "mcq") {
                    cAnsText = q.a[q.correct];
                    if (userVal !== undefined) { sAnsText = q.a[userVal]; if (userVal === q.correct) earned = 5/countMCQ; }
                    else sAnsText = "Chưa làm";
                } else if (q.type === "tf") {
                    let cp = 0, saArr = [], caArr = [];
                    q.statements.forEach((st, sIdx) => {
                        const uVal = userVal ? userVal[sIdx] : null;
                        if (uVal === st.isTrue.toString()) cp++;
                        saArr.push(uVal ? (uVal === "true" ? "Đ" : "S") : "_");
                        caArr.push(st.isTrue ? "Đ" : "S");
                    });
                    earned = (cp / q.statements.length) * (3/countTF);
                    sAnsText = saArr.join("|"); cAnsText = caArr.join("|");
                } else {
                    cAnsText = q.correct; sAnsText = userVal || "Chưa làm";
                    if (sAnsText.toLowerCase() === q.correct.toLowerCase()) earned = 2/countShort;
                }
                rawScore += earned;
                historyArr.push({ qText: q.q, sAns: sAnsText, cAns: cAnsText, earned, explanation: q.explanation });
            });

            const finalScore = parseFloat(rawScore.toFixed(2));
            const log = { date: new Date().toLocaleString(), score: finalScore, details: historyArr, examName: picker.value, mode: currentMode };
            
            if (currentMode === 'exam') update(ref(db, `students/${currentUser.fullName}`), { status: "Xong", score: finalScore });
            push(ref(db, `history_all/${currentUser.username}`), log);
            
            renderResultPage(historyArr, finalScore, "KẾT QUẢ VỪA LÀM");
            showScreen('screen-result');
        }

        function renderResultPage(historyArr, scoreVal, title) {
            document.getElementById("res-head").innerText = title;
            document.getElementById("score-text").innerText = scoreVal;
            let h = "";
            historyArr.forEach((item, i) => {
                h += `<div class="review-box">
                    <p><b>Câu ${i+1}:</b> ${item.qText}</p>
                    <p>Em chọn: <b style="color:${item.earned>0?'green':'red'}">${item.sAns}</b> | Đáp án: <b>${item.cAns}</b></p>
                    <div class="explanation-box"><b>📖 Lời giải:</b><br>${item.explanation}</div>
                </div>`;
            });
            document.getElementById("review-area").innerHTML = h;
            if(window.MathJax) MathJax.typesetPromise();
        }

        window.viewHistory = async () => {
            const snap = await get(ref(db, `history_all/${currentUser.username}`));
            let h = ""; tempHistoryList = [];
            if(snap.exists()) {
                const data = snap.val();
                Object.keys(data).reverse().forEach((key) => {
                    const item = data[key];
                    tempHistoryList.push(item);
                    h += `<div class="history-card">
                        <div>📅 ${item.date} [${item.examName}]<br><b>Điểm: ${item.score}/10</b></div>
                        <button class="btn btn-blue" style="width:auto; padding:8px 15px; margin:0;" onclick="showHistoryDetail(${tempHistoryList.length - 1})">Chi tiết</button>
                    </div>`;
                });
            } else h = "Chưa có dữ liệu lịch sử.";
            document.getElementById("history-content").innerHTML = h;
            showScreen('screen-history');
        };

        window.showHistoryDetail = (index) => {
            const item = tempHistoryList[index];
            renderResultPage(item.details, item.score, "CHI TIẾT LỊCH SỬ");
            showScreen('screen-result');
        };
    </script>
</body>
</html>
