<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thi Trực Tuyến - Thầy Hùng Anh</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f8fafc; --text: #0f172a; --border: #cbd5e1; }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 750px; border-top: 6px solid var(--primary); margin-top: 20px; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 14px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; font-weight: bold; }
        .mcq-option { display: block; width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid var(--border); border-radius: 8px; background: white; cursor: pointer; text-align: left; }
        .mcq-option.selected { border-color: var(--primary); background: #eff6ff; font-weight: bold; }
        .tf-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .tf-table th, .tf-table td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        .short-answer-input { width: 100%; max-width: 300px; text-align: center; font-size: 18px; font-weight: bold; padding: 10px; }
        .review-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .explanation-box { background: #dcfce7; border-left: 4px solid #16a34a; padding: 15px; margin-top: 15px; border-radius: 0 8px 8px 0; }
        #quiz-screen, #result-screen { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-screen" style="text-align: center;">
            <h2>LeHoang Education</h2>
            <input type="text" id="studentName" placeholder="Họ và Tên" style="width:100%; padding:14px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
            <input type="password" id="accessCode" placeholder="Mã phòng thi" style="width:100%; padding:14px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
            <button class="btn-primary" onclick="startQuiz()">VÀO PHÒNG THI</button>
        </div>

        <div id="quiz-screen">
            <div class="header-bar"><span id="display-name"></span><span id="question-count"></span></div>
            <div id="question-text" style="font-size:18px; margin-bottom:20px;"></div>
            <div id="interactive-area"></div>
            <button class="btn-primary" onclick="submitAnswer()" id="btn-next">TIẾP THEO</button>
        </div>

        <div id="result-screen">
            <h2 style="text-align:center; color:#16a34a;">ĐÃ NỘP BÀI</h2>
            <div id="score-display" style="text-align:center; font-size:30px; font-weight:bold; margin-bottom:20px;"></div>
            <div id="review-area"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            databaseURL: "https://phamhunganhquiz-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phamhunganhquiz",
            storageBucket: "phamhunganhquiz.firebasestorage.app",
            appId: "1:948379693019:web:a9acf119254d237018c1fe"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const questions = [
            { type: "mcq", q: "Đạo hàm của \\( y = e^{2x} \\) là:", a: ["e^{2x}", "2e^{2x}", "1/2e^{2x}", "2xe^{2x}"], correct: 1, explanation: "Công thức (e^u)' = u'.e^u" },
            { type: "tf", q: "Hàm số \\( y = x^3 - 3x \\):", statements: [{text: "Đồng biến trên (1; +∞)", isTrue: true}, {text: "Cực đại tại x=1", isTrue: false}], explanation: "y' = 3x^2-3, dương trên (1; +∞)" },
            { type: "short", q: "Giá trị lớn nhất của \\( y = -x^2 + 4x + 1 \\):", correct: "5", explanation: "Đỉnh Parabol tại x=2, y=5" }
        ];

        let currentQ = 0, score = 0, studentName = "", selectedMcq = null, studentHistory = [];

        window.startQuiz = () => {
            studentName = document.getElementById("studentName").value.trim();
            if(!studentName || document.getElementById("accessCode").value !== "TOAN2026") return alert("Thông tin sai!");
            set(ref(db, 'students/' + studentName), { status: "Đang làm", question: 1, score: 0, totalQ: questions.length, detailAnswers: [] });
            onDisconnect(ref(db, 'students/' + studentName)).update({ status: "Thoát" });
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("quiz-screen").style.display = "block";
            renderQuestion();
        };

        function renderQuestion() {
            const q = questions[currentQ];
            document.getElementById("question-count").innerText = `Câu ${currentQ+1}/${questions.length}`;
            document.getElementById("question-text").innerHTML = q.q;
            let html = "";
            if(q.type === "mcq") q.a.forEach((ans, i) => html += `<button class="mcq-option" id="mcq-${i}" onclick="selectedMcq=${i}; document.querySelectorAll('.mcq-option').forEach(b=>b.classList.remove('selected')); document.getElementById('mcq-${i}').classList.add('selected')">${ans}</button>`);
            else if(q.type === "tf") {
                html += `<table class="tf-table"><tr><th>Mệnh đề</th><th>Đ</th><th>S</th></tr>`;
                q.statements.forEach((s, i) => html += `<tr><td>${s.text}</td><td><input type="radio" name="tf-${i}" value="true"></td><td><input type="radio" name="tf-${i}" value="false"></td></tr>`);
                html += `</table>`;
            } else html = `<input type="text" id="short-ans" class="short-answer-input">`;
            document.getElementById("interactive-area").innerHTML = html;
            if(window.MathJax) MathJax.typesetPromise();
        }

        window.submitAnswer = () => {
            const q = questions[currentQ];
            let earned = 0, studentAnsText = "", correctAnsText = "";

            if(q.type === "mcq") {
                if(selectedMcq === null) return;
                studentAnsText = q.a[selectedMcq];
                correctAnsText = q.a[q.correct];
                if(selectedMcq === q.correct) earned = 1;
            } else if(q.type === "tf") {
                let correctParts = 0, sAns = [], cAns = [];
                q.statements.forEach((s, i) => {
                    const sel = document.querySelector(`input[name="tf-${i}"]:checked`)?.value;
                    if(sel === s.isTrue.toString()) correctParts++;
                    sAns.push(sel === "true" ? "Đ" : "S");
                    cAns.push(s.isTrue ? "Đ" : "S");
                });
                earned = correctParts * 0.25;
                studentAnsText = sAns.join(", ");
                correctAnsText = cAns.join(", ");
            } else {
                studentAnsText = document.getElementById("short-ans").value.trim();
                correctAnsText = q.correct;
                if(studentAnsText.toLowerCase() === q.correct.toLowerCase()) earned = 1;
            }

            score += earned;
            studentHistory.push({ sAns: studentAnsText, cAns: correctAnsText, earned: earned });
            update(ref(db, 'students/' + studentName), { score: score, question: currentQ + 1, detailAnswers: studentHistory });
            
            currentQ++;
            if(currentQ < questions.length) renderQuestion();
            else finish();
        };

        function finish() {
            update(ref(db, 'students/' + studentName), { status: "Xong" });
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            document.getElementById("score-display").innerText = `Điểm: ${score}`;
            let h = "";
            questions.forEach((q, i) => h += `<div class="review-box"><b>Câu ${i+1}:</b> ${q.q}<br>Đã chọn: ${studentHistory[i].sAns}<br>Đáp án: ${studentHistory[i].cAns}<div class="explanation-box">${q.explanation}</div></div>`);
            document.getElementById("review-area").innerHTML = h;
            if(window.MathJax) MathJax.typesetPromise();
        }
    </script>
</body>
</html>
