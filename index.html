<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp toán thầy Hùng Anh - LeHoang Education</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #0f172a; --border: #cbd5e1; }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); width: 100%; max-width: 750px; border-top: 8px solid var(--primary); margin-top: 20px; }
        .screen { display: none; } .active { display: block; }
        #screen-login h1 { color: var(--primary); margin-bottom: 5px; font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        #screen-login h2 { color: #64748b; font-size: 18px; margin-bottom: 40px; font-weight: 500; }
        input { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; transition: all 0.3s; background: #f8fafc; }
        input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn { width: 100%; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; margin-bottom: 12px; color: white; transition: 0.3s; display: block; text-align: center; }
        .btn-blue { background: #2563eb; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.4); } 
        .btn-green { background: #10b981; } .btn-gray { background: #475569; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; font-weight: bold; }
        .question-text { font-size: 19px; line-height: 1.6; margin-bottom: 30px; }
        .mcq-option { display: block; width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid var(--border); border-radius: 10px; background: white; cursor: pointer; text-align: left; font-size: 17px; }
        .mcq-option.selected { border-color: var(--primary); background: #eff6ff; font-weight: bold; }
        .tf-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .tf-table th, .tf-table td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        .review-box { text-align: left; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 25px; margin-bottom: 20px; }
        .explanation-box { background: #dcfce7; border-left: 5px solid #16a34a; padding: 15px; margin-top: 15px; border-radius: 0 8px 8px 0; font-size: 15px; }
        .history-card { border: 1px solid var(--border); padding: 18px; border-radius: 10px; margin-bottom: 15px; background: white; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <div id="screen-login" class="screen active" style="text-align: center;">
            <h1>Lớp toán thầy Hùng Anh</h1>
            <h2>LeHoang Education</h2>
            <input type="text" id="loginUser" placeholder="Tên đăng nhập">
            <input type="password" id="loginPass" placeholder="Mật khẩu">
            <button class="btn btn-blue" onclick="handleLogin()">BẮT ĐẦU HỌC TẬP</button>
        </div>

        <div id="screen-dashboard" class="screen" style="text-align: center;">
            <h2 id="welcome-text"></h2>
            <button class="btn btn-blue" onclick="startMode('exam')">🔴 VÀO PHÒNG THI CHÍNH THỨC</button>
            <button class="btn btn-green" onclick="startMode('practice')">🟢 TỰ LUYỆN TẬP CUỐI GIỜ</button>
            <button class="btn btn-gray" onclick="viewHistory()">🕒 XEM LỊCH SỬ BÀI LÀM</button>
            <button class="btn" style="background:#e2e8f0; color:#475569;" onclick="location.reload()">Đăng xuất</button>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="header-bar"><span id="quiz-title"></span><span id="question-count"></span></div>
            <div id="question-text" class="question-text"></div>
            <div id="interactive-area"></div>
            <button class="btn btn-blue" onclick="submitAnswer()" id="btn-next" style="margin-top:20px;">LƯU & CÂU TIẾP THEO ➔</button>
        </div>

        <div id="screen-result" class="screen">
            <h2 id="res-head" style="text-align:center; color:#16a34a;">✓ HOÀN THÀNH</h2>
            <div style="text-align:center; background:#f8fafc; border:2px dashed var(--primary); padding:25px; border-radius:15px; margin:25px 0;">
                <p>Điểm của em (Thang điểm 10):</p>
                <strong id="score-text" style="font-size:50px; color:var(--primary);"></strong>
            </div>
            <div id="review-area"></div>
            <button class="btn btn-blue" onclick="showScreen('screen-dashboard')">TRỞ VỀ MENU CHÍNH</button>
        </div>

        <div id="screen-history" class="screen">
            <h2 style="color:var(--primary); text-align:left;">Lịch sử bài làm</h2>
            <div id="history-content"></div>
            <button class="btn btn-gray" onclick="showScreen('screen-dashboard')">QUAY LẠI</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            databaseURL: "https://phamhunganhquiz-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phamhunganhquiz",
            appId: "1:948379693019:web:a9acf119254d237018c1fe"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const questions = [
            { type: "mcq", q: "Câu 1. Đạo hàm hàm số \\( y = e^{2x} \\) là:", a: ["\\( e^{2x} \\)", "\\( 2e^{2x} \\)", "\\( \\frac{1}{2}e^{2x} \\)", "Kết quả khác"], correct: 1, explanation: "Công thức \\( (e^u)' = u' e^u \\)." },
            { type: "tf", q: "Câu 2. Cho hàm số \\( y = x^2 \\). Các mệnh đề sau đúng hay sai?", statements: [{text: "Hàm số đồng biến trên R", isTrue: false}, {text: "Hàm số có cực tiểu tại x=0", isTrue: true}], explanation: "Hàm đồng biến khi x > 0." },
            { type: "short", q: "Câu 3. Tìm m để đồ thị đi qua gốc tọa độ? (Nhập giá trị số)", correct: "0", explanation: "Thay (0,0) vào phương trình." }
        ];

        let currentUser = null, currentMode = "", currentQ = 0, rawScore = 0, selectedMcq = null, studentHistory = [], tempHistoryList = [], cheatCount = 0;

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(window.MathJax) MathJax.typesetPromise();
        };

        window.handleLogin = async () => {
            const u = document.getElementById("loginUser").value.trim().toLowerCase();
            const p = document.getElementById("loginPass").value.trim();
            const snap = await get(ref(db, 'accounts/' + u));
            if(snap.exists() && snap.val().password === p) {
                currentUser = { username: u, fullName: snap.val().fullName };
                document.getElementById("welcome-text").innerText = `Chào em, ${currentUser.fullName}!`;
                update(ref(db, 'students/' + currentUser.fullName), { status_online: "Trực tuyến" });
                onDisconnect(ref(db, 'students/' + currentUser.fullName)).update({ status_online: "Ngoại tuyến" });
                showScreen('screen-dashboard');
            } else alert("Sai tài khoản!");
        };

        window.startMode = (mode) => {
            currentMode = mode;
            if(mode === 'exam' && prompt("Mã phòng thi:") !== "TOAN2026") return;
            currentQ = 0; rawScore = 0; studentHistory = []; cheatCount = 0;
            showScreen('screen-quiz');
            renderQuestion();
        };

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && currentMode === 'exam' && document.getElementById('screen-quiz').classList.contains('active')) {
                cheatCount++;
                alert(`CẢNH BÁO: Bạn đã thoát lần ${cheatCount}/2! Thoát lần nữa hệ thống sẽ nộp bài.`);
                update(ref(db, `students/${currentUser.fullName}`), { cheats: cheatCount });
                if (cheatCount >= 2) { finish(); }
            }
        });

        function renderQuestion() {
            const q = questions[currentQ];
            document.getElementById("quiz-title").innerText = currentMode === 'exam' ? "THI CHÍNH THỨC" : "TỰ LUYỆN";
            document.getElementById("question-count").innerText = `Câu ${currentQ+1}/${questions.length}`;
            document.getElementById("question-text").innerHTML = q.q;
            let html = "";
            if(q.type === "mcq") {
                selectedMcq = null;
                q.a.forEach((ans, i) => html += `<button class="mcq-option" id="mcq-${i}" onclick="selectAnswerMcq(${i})">${ans}</button>`);
            } else if(q.type === "tf") {
                html += `<table class="tf-table"><tr><th>Mệnh đề</th><th>Đ</th><th>S</th></tr>`;
                q.statements.forEach((s, i) => html += `<tr><td style="text-align:left;">${s.text}</td><td><input type="radio" name="tf-${i}" value="true"></td><td><input type="radio" name="tf-${i}" value="false"></td></tr>`);
                html += `</table>`;
            } else html = `<input type="text" id="short-ans" style="text-align:center; font-weight:bold;" placeholder="Gõ đáp án...">`;
            document.getElementById("interactive-area").innerHTML = html;
            if(window.MathJax) MathJax.typesetPromise();
        }

        window.selectAnswerMcq = (i) => {
            selectedMcq = i;
            document.querySelectorAll('.mcq-option').forEach(b => b.classList.remove('selected'));
            document.getElementById(`mcq-${i}`).classList.add('selected');
        };

        window.submitAnswer = () => {
            const q = questions[currentQ];
            let earned = 0, sAns = "", cAns = "";
            
            // TÍNH TOÁN TRỌNG SỐ ĐIỂM
            const countMCQ = questions.filter(item => item.type === 'mcq').length;
            const countTF = questions.filter(item => item.type === 'tf').length;
            const countShort = questions.filter(item => item.type === 'short').length;

            if(q.type === "mcq") {
                if(selectedMcq === null) return alert("Em chưa chọn đáp án!");
                sAns = q.a[selectedMcq]; cAns = q.a[q.correct]; 
                if(selectedMcq === q.correct) earned = 5 / (countMCQ || 1);
            } else if(q.type === "tf") {
                let cp = 0, sa = [], ca = [], ok = true;
                q.statements.forEach((s, i) => {
                    const v = document.querySelector(`input[name="tf-${i}"]:checked`)?.value;
                    if(!v) ok = false; else { if(v === s.isTrue.toString()) cp++; sa.push(v==="true"?"Đ":"S"); }
                    ca.push(s.isTrue?"Đ":"S");
                });
                if(!ok) return alert("Chọn đầy đủ Đúng/Sai!");
                earned = (cp / q.statements.length) * (3 / (countTF || 1));
                sAns = sa.join("|"); cAns = ca.join("|");
            } else {
                sAns = document.getElementById("short-ans").value.trim();
                if(!sAns) return alert("Chưa nhập đáp án!");
                cAns = q.correct; if(sAns.toLowerCase() === q.correct.toLowerCase()) earned = 2 / (countShort || 1);
            }

            rawScore += earned;
            studentHistory.push({ qText: q.q, sAns, cAns, earned, explanation: q.explanation });
            currentQ++;

            if(currentMode === 'exam') update(ref(db, `students/${currentUser.fullName}`), { score: rawScore.toFixed(2), detailAnswers: studentHistory, totalQ: questions.length, status: "Đang làm", question: currentQ });

            if(currentQ < questions.length) renderQuestion(); else finish();
        };

        function finish() {
            let finalScore = parseFloat(rawScore.toFixed(2));
            const data = { date: new Date().toLocaleString(), score: finalScore, details: studentHistory, mode: currentMode };
            if(currentMode === 'exam') {
                update(ref(db, `students/${currentUser.fullName}`), { status: "Xong", score: finalScore });
                push(ref(db, `history_all/${currentUser.username}`), data);
            } else push(ref(db, `history_all/${currentUser.username}`), data);
            
            renderResultPage(studentHistory, finalScore, "KẾT QUẢ VỪA LÀM");
            showScreen('screen-result');
        }

        function renderResultPage(historyArr, scoreVal, title) {
            document.getElementById("res-head").innerText = title;
            document.getElementById("score-text").innerText = scoreVal;
            let html = "";
            historyArr.forEach((item, i) => {
                html += `<div class="review-box">
                    <p><b>Câu ${i+1}:</b> ${item.qText}</p>
                    <p>Em chọn: <b style="color:${item.earned>0?'green':'red'}">${item.sAns}</b> - Đáp án: <b>${item.cAns}</b></p>
                    <div class="explanation-box"><b>📖 Lời giải:</b><br>${item.explanation}</div>
                </div>`;
            });
            document.getElementById("review-area").innerHTML = html;
            if(window.MathJax) MathJax.typesetPromise();
        }

        window.viewHistory = async () => {
            const snap = await get(ref(db, `history_all/${currentUser.username}`));
            let h = ""; tempHistoryList = [];
            if(snap.exists()) {
                const data = snap.val();
                Object.keys(data).reverse().forEach((key, index) => {
                    tempHistoryList.push(data[key]);
                    h += `<div class="history-card">
                        <div>📅 ${data[key].date} [${data[key].mode === 'exam' ? 'Thi' : 'Luyện'}]<br><b>Điểm: ${data[key].score}/10</b></div>
                        <button class="btn btn-blue" style="width:auto; padding:8px 15px; margin:0;" onclick="showHistoryDetail(${tempHistoryList.length - 1})">Chi tiết</button>
                    </div>`;
                });
            } else h = "Chưa có dữ liệu lịch sử.";
            document.getElementById("history-content").innerHTML = h;
            showScreen('screen-history');
        };

        window.showHistoryDetail = (index) => {
            const item = tempHistoryList[index];
            renderResultPage(item.details, item.score, "CHI TIẾT LỊCH SỬ");
            showScreen('screen-result');
        };
    </script>
</body>
</html>
