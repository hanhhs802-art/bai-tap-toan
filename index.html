<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp toán thầy Hùng Anh - LeHoang Education</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #0f172a; --border: #cbd5e1; }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 750px; border-top: 8px solid var(--primary); margin-top: 20px; }
        .screen { display: none; } .active { display: block; }
        #screen-login h1 { color: var(--primary); margin-bottom: 5px; font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        #screen-login h2 { color: #64748b; font-size: 18px; margin-bottom: 40px; font-weight: 500; }
        input, select { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; background: #f8fafc; }
        .btn { padding: 16px; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; margin-bottom: 12px; color: white; transition: 0.3s; text-align: center; }
        .btn-blue { background: #2563eb; width: 100%; } .btn-green { background: #10b981; width: 100%; } .btn-gray { background: #475569; width: 100%; }
        .nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-nav { flex: 1; background: #64748b; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-submit { flex: 1; background: #ef4444; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .question-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
        .q-box { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; background: #f8fafc; }
        .q-box.answered { background: var(--primary); color: white; border-color: var(--primary); }
        .q-box.current { border: 2px solid var(--text); background: #e2e8f0; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; font-weight: bold; }
        .timer-box { color: #ef4444; background: #fee2e2; padding: 6px 12px; border-radius: 8px; font-family: monospace; font-size: 18px; }
        .question-text { font-size: 19px; line-height: 1.6; margin-bottom: 30px; min-height: 80px; }
        .mcq-option { display: block; width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid var(--border); border-radius: 10px; background: white; cursor: pointer; text-align: left; font-size: 17px; }
        .mcq-option.selected { border-color: var(--primary); background: #eff6ff; font-weight: bold; box-shadow: 0 0 0 2px var(--primary); }
        .tf-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .tf-table th, .tf-table td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        .review-box { text-align: left; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 25px; margin-bottom: 20px; }
        .explanation-box { background: #dcfce7; border-left: 5px solid #16a34a; padding: 15px; margin-top: 15px; border-radius: 0 8px 8px 0; font-size: 15px; }
        .history-card { border: 1px solid var(--border); padding: 18px; border-radius: 10px; margin-bottom: 15px; background: white; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <div id="screen-login" class="screen active" style="text-align: center;">
            <h1>Lớp toán thầy Hùng Anh</h1>
            <h2>LeHoang Education</h2>
            <input type="text" id="loginUser" placeholder="Tên đăng nhập">
            <input type="password" id="loginPass" placeholder="Mật khẩu">
            <button class="btn btn-blue" onclick="handleLogin()">BẮT ĐẦU HỌC TẬP</button>
        </div>

        <div id="screen-dashboard" class="screen" style="text-align: center;">
            <h2 id="welcome-text"></h2>
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="font-weight: bold; color: var(--primary);">Chọn Đề kiểm tra/Luyện tập:</label>
                <select id="examPicker"></select>
            </div>
            <button class="btn btn-blue" onclick="startMode('exam')">🔴 VÀO PHÒNG THI CHÍNH THỨC</button>
            <button class="btn btn-green" onclick="startMode('practice')">🟢 TỰ LUYỆN TẬP CUỐI GIỜ</button>
            <button class="btn btn-gray" onclick="viewHistory()">🕒 XEM LỊCH SỬ BÀI LÀM</button>
            <button class="btn" style="background:#e2e8f0; color:#475569;" onclick="location.reload()">Đăng xuất</button>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="header-bar">
                <span id="quiz-title"></span>
                <span class="timer-box" id="timer">00:00</span>
                <span id="question-count"></span>
            </div>
            <div id="question-text" class="question-text"></div>
            <div id="interactive-area"></div>
            <div class="nav-buttons">
                <button class="btn-nav" id="btn-prev" onclick="changeQuestion(-1)">⬅ Câu trước</button>
                <button class="btn-nav" id="btn-next" onclick="changeQuestion(1)">Câu tiếp ➡</button>
                <button class="btn-submit" onclick="confirmFinish()">NỘP BÀI</button>
            </div>
            <div id="question-grid" class="question-grid"></div>
        </div>

        <div id="screen-result" class="screen">
            <h2 id="res-head" style="text-align:center; color:#16a34a;">✓ HOÀN THÀNH</h2>
            <div style="text-align:center; background:#f8fafc; border:2px dashed var(--primary); padding:25px; border-radius:15px; margin:25px 0;">
                <p>Điểm của em (Thang 10):</p>
                <strong id="score-text" style="font-size:50px; color:var(--primary);"></strong>
            </div>
            <div id="review-area"></div>
            <button class="btn btn-blue" onclick="showScreen('screen-dashboard')">TRỞ VỀ MENU CHÍNH</button>
        </div>

        <div id="screen-history" class="screen">
            <h2 style="color:var(--primary); text-align:left;">Lịch sử bài làm</h2>
            <div id="history-content"></div>
            <button class="btn btn-gray" onclick="showScreen('screen-dashboard')">QUAY LẠI</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            databaseURL: "https://phamhunganhquiz-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phamhunganhquiz",
            appId: "1:948379693019:web:a9acf119254d237018c1fe"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // KHO ĐỀ MẪU (Sửa lỗi công thức Toán)
        const allExams = {
            "Đề số 1": {
        time: 45, // THÊM THỜI GIAN Ở ĐÂY (đơn vị là số phút)
        questions: [
                {"type":"mcq","q":"Câu 1. Tủ lạnh nhà bạn An có 20 hộp sữa và 15 cái bánh quy, trong đó có 12 hộp sữa có hương dâu và 8 hộp sữa sô cô la, 8 cái bánh quy hương sô cô la và 7 cái bánh quy hương dâu. Bạn An đang cần lựa 1 món bánh sô cô la và 1 hộp sữa dâu để ăn bữa chiều. Hỏi bạn An có bao nhiêu cách chọn?","a":["96","84","15","35"],"correct":0,"explanation":"Chọn 1 hộp sữa hương dâu có 12 cách. Chọn 1 bánh quy sô cô la có 8 cách. Theo quy tắc nhân, có \\( 12 \\times 8 = 96 \\) cách."},
{"type":"mcq","q":"Câu 2. Từ thành phố A có 9 con đường đi đến thành phố B, từ thành phố A có 8 con đường đi đến thành phố C, từ thành phố B đến thành phố D có 5 con đường, từ thành phố C đến thành phố D có 10 con đường và không có con đường nào nối thành phố B với thành phố C. Hỏi có bao nhiêu cách đi từ thành phố A đến thành phố D?","a":["32","125","122","137"],"correct":1,"explanation":"TH1: Đi A -> B -> D có \\( 9 \\times 5 = 45 \\) cách. TH2: Đi A -> C -> D có \\( 8 \\times 10 = 80 \\) cách. Tổng có \\( 45 + 80 = 125 \\) cách."},
{"type":"mcq","q":"Câu 3. Cho tập hợp \\( A = \\{1; 2; 4; 5; 7; 8\\} \\). Có bao nhiêu số tự nhiên gồm 4 chữ số được lập từ A sao cho các chữ số khác nhau từng đôi một?","a":["360","26","189","180"],"correct":0,"explanation":"Số các số tạo thành là chỉnh hợp chập 4 của 6 phần tử: \\( A_6^4 = 360 \\)."},
{"type":"mcq","q":"Câu 4. Từ các số \\( 0; 1; 2; 3; 4; 5 \\) có thể lập được bao nhiêu số chẵn gồm 4 chữ số khác nhau?","a":["120","200","156","240"],"correct":2,"explanation":"Gọi số chẵn là \\( \\overline{abcd} \\). TH1: \\( d=0 \\) có 1 cách, \\( a,b,c \\) có \\( A_5^3 = 60 \\) cách. TH2: \\( d \\in \\{2, 4\\} \\) có 2 cách, \\( a \\neq 0 \\) có 4 cách, \\( b,c \\) có \\( A_4^2 = 12 \\) cách -> \\( 2 \\times 4 \\times 12 = 96 \\) cách. Tổng: \\( 60 + 96 = 156 \\) số."},
{"type":"mcq","q":"Câu 5. Cho tập hợp \\( A=\\{0; 1; 2; 3; 4; 5; 6; 7\\} \\). Có bao nhiêu số tự nhiên gồm 4 chữ số được lập từ A sao cho các chữ số khác nhau từng đôi một và là số lẻ?","a":["720","1470","210","750"],"correct":0,"explanation":"Gọi số là \\( \\overline{abcd} \\). \\( d \\in \\{1, 3, 5, 7\\} \\) có 4 cách. \\( a \\neq 0 \\) có 6 cách. Chọn \\( b,c \\) có \\( A_6^2 = 30 \\) cách. Quy tắc nhân: \\( 4 \\times 6 \\times 30 = 720 \\)."},
{"type":"mcq","q":"Câu 6. Có bao nhiêu số tự nhiên có 3 chữ số đôi một phân biệt và chia hết cho 5?","a":["136","128","256","1458"],"correct":0,"explanation":"Gọi số là \\( \\overline{abc} \\) với \\( c \\in \\{0, 5\\} \\). TH1: \\( c=0 \\) có \\( 1 \\times 9 \\times 8 = 72 \\) số. TH2: \\( c=5 \\) có \\( 1 \\times 8 \\times 8 = 64 \\) số. Tổng: \\( 72 + 64 = 136 \\)."},
{"type":"mcq","q":"Câu 7. Một thùng trong đó có 19 hộp đựng bút màu đỏ, 15 hộp đựng bút màu xanh. Số cách khác nhau để chọn được đồng thời một hộp màu đỏ, một hộp màu xanh là:","a":["19","285","15","34"],"correct":1,"explanation":"Áp dụng quy tắc nhân: \\( 19 \\times 15 = 285 \\) cách."},
{"type":"mcq","q":"Câu 8. Trong một tuần bạn A dự định mỗi ngày đi thăm một người bạn trong 12 người bạn của mình. Hỏi bạn A có thể lập được bao nhiêu kế hoạch đi thăm bạn của mình (thăm một bạn không quá một lần)?","a":["3991680","\\( 12! \\)","35831808","\\( 7! \\)"],"correct":0,"explanation":"Mỗi kế hoạch là một chỉnh hợp chập 7 của 12 phần tử: \\( A_{12}^7 = 3991680 \\)."},
{"type":"mcq","q":"Câu 9. Nhãn mỗi chiếc ghế trong hội trường gồm hai phần: phần đầu là một chữ cái, phần thứ hai là một số nguyên dương nhỏ hơn 26. Hỏi có nhiều nhất bao nhiêu chiếc ghế được ghi nhãn khác nhau?","a":["624","48","600","26"],"correct":2,"explanation":"Chọn 1 chữ cái có 24 cách (theo bảng chữ cái tham chiếu). Chọn số nguyên dương nhỏ hơn 26 (từ 1 đến 25) có 25 cách. Tổng: \\( 24 \\times 25 = 600 \\) cách."},
{"type":"mcq","q":"Câu 10. Biển số xe máy của tỉnh A có 6 kí tự, trong đó kí tự ở vị trí đầu tiên là một chữ cái, kí tự ở vị trí thứ hai là một chữ số thuộc tập \\( \\{1; 2; ...; 9\\} \\), mỗi kí tự ở bốn vị trí tiếp theo là một chữ số thuộc tập \\( \\{0; 1; 2; ...; 9\\} \\). Hỏi nếu chỉ dùng một mã số tỉnh thì tỉnh A có thể làm được nhiều nhất bao nhiêu biển số xe máy khác nhau?","a":["2340000","234000","75","2600000"],"correct":0,"explanation":"Chọn chữ cái có 26 cách. Chọn chữ số đầu có 9 cách. Bốn vị trí sau có \\( 10^4 \\) cách. Tổng: \\( 26 \\times 9 \\times 10^4 = 2340000 \\)."},
{"type":"mcq","q":"Câu 11. Có 4 cặp vợ chồng được xếp ngồi trên một chiếc ghế dài có 8 chỗ. Biết rằng mỗi người vợ chỉ ngồi cạnh chồng của mình hoặc ngồi cạnh một người phụ nữ khác. Hỏi có bao nhiêu cách sắp xếp chỗ ngồi thỏa mãn?","a":["816","18","\\( 8! \\)","604"],"correct":0,"explanation":"Chia các trường hợp số cặp ngồi cạnh nhau (1 cặp, 2 cặp, 3 cặp, 4 cặp) và áp dụng nguyên lý bù trừ kết hợp hoán vị. Tổng số cách thỏa mãn là 816 cách."},
{"type":"mcq","q":"Câu 12. Nếu một đa giác lồi có 44 đường chéo thì đa giác đó có bao nhiêu cạnh?","a":["8","10","9","11"],"correct":3,"explanation":"Số đường chéo của đa giác \\( n \\) cạnh là \\( \\frac{n(n-3)}{2} \\). Ta có \\( \\frac{n(n-3)}{2} = 44 \\Rightarrow n^2 - 3n - 88 = 0 \\Rightarrow n = 11 \\)."},
{"type":"mcq","q":"Câu 13. Có 3 viên bi đen khác nhau, 4 viên bi đỏ khác nhau, 5 viên bi xanh khác nhau. Hỏi có bao nhiêu cách xếp các viên bi trên thành dãy sao cho các viên bi cùng màu ở cạnh nhau?","a":["345600","518400","725760","103680"],"correct":3,"explanation":"Hoán vị các bi cùng màu: \\( 3!, 4!, 5! \\). Hoán vị 3 nhóm màu với nhau: \\( 3! \\). Tổng: \\( 3! \\times 4! \\times 5! \\times 3! = 103680 \\)."},
{"type":"mcq","q":"Câu 14. Một nhóm học sinh có 7 em nam và 3 em nữ. Hỏi có bao nhiêu cách xếp 10 em này trên một hàng ngang, sao cho hai vị trí đầu và cuối hàng là các em nam và không có 2 em nữ nào ngồi cạnh nhau?","a":["604800","344000","100800","120120"],"correct":0,"explanation":"Xếp 7 nam có \\( 7! \\) cách. 7 nam tạo ra 6 khoảng trống ở giữa (không tính 2 đầu vì bắt buộc là nam). Xếp 3 nữ vào 6 khoảng trống có \\( A_6^3 \\) cách. Tổng: \\( 7! \\times A_6^3 = 604800 \\)."},
{"type":"mcq","q":"Câu 15. Sắp xếp năm bạn học sinh A, B, C, D, E vào một chiếc ghế dài có 5 chỗ ngồi. Số cách sắp xếp sao cho bạn A và bạn E luôn ngồi ở hai đầu ghế là:","a":["120","16","12","24"],"correct":2,"explanation":"Xếp A và E ở 2 đầu có \\( 2! \\) cách. Xếp B, C, D vào 3 vị trí giữa có \\( 3! \\) cách. Tổng: \\( 2! \\times 3! = 12 \\)."},
{"type":"mcq","q":"Câu 16. Xếp ngẫu nhiên 5 lá phiếu có ghi số thứ tự từ 1 đến 5 cạnh nhau. Có bao nhiêu cách xếp để các phiếu ghi số chẵn luôn ở cạnh nhau?","a":["48","24","120","60"],"correct":0,"explanation":"Coi 2 số chẵn (2, 4) là 1 nhóm. Hoán vị trong nhóm: \\( 2! \\). Xếp nhóm này cùng 3 số lẻ (tổng 4 phần tử): \\( 4! \\). Số cách: \\( 2! \\times 4! = 48 \\)."},
{"type":"mcq","q":"Câu 17. Cho 15 điểm trên cùng một mặt phẳng sao cho không có ba điểm nào thẳng hàng. Có bao nhiêu tam giác có cả ba đỉnh là 3 trong số 15 điểm đã cho?","a":["3375","2730","455","45"],"correct":2,"explanation":"Mỗi tam giác được tạo bởi 3 điểm phân biệt: \\( C_{15}^3 = 455 \\)."},
{"type":"mcq","q":"Câu 18. Cho đa giác đều \\( n \\) đỉnh, \\( n \\in \\mathbb{N} \\) và \\( n \\ge 3 \\). Tìm \\( n \\) biết rằng đa giác đã cho có 170 đường chéo.","a":["\\( n=15 \\)","\\( n=27 \\)","\\( n=8 \\)","\\( n=20 \\)"],"correct":3,"explanation":"Áp dụng công thức đường chéo: \\( \\frac{n(n-3)}{2} = 170 \\Rightarrow n^2 - 3n - 340 = 0 \\Rightarrow n = 20 \\)."},
{"type":"mcq","q":"Câu 19. Trong một giải đua xe đạp gồm 20 vận động viên, người ta chỉ quan tâm đến 3 vận động viên: vận động viên nhanh nhất, nhanh nhì và nhanh thứ ba. Hỏi có bao nhiêu kết quả có thể xảy ra?","a":["3420","2280","1140","6840"],"correct":3,"explanation":"Chọn và sắp thứ tự 3 người từ 20 vận động viên: \\( A_{20}^3 = 6840 \\)."},
{"type":"mcq","q":"Câu 20. Câu lạc bộ Ghita có 16 thành viên. Số cách chọn một ban chấp hành bất kì gồm một trưởng ban, một phó ban, một thư kí và một thủ quỹ được chọn từ 16 thành viên là:","a":["4","\\( \\frac{16!}{4} \\)","\\( \\frac{16!}{12!4!} \\)","\\( \\frac{16!}{12!} \\)"],"correct":3,"explanation":"Chọn 4 vị trí có phân biệt chức vụ từ 16 người là một chỉnh hợp chập 4: \\( A_{16}^4 = \\frac{16!}{(16-4)!} = \\frac{16!}{12!} \\)."},
{"type":"tf","q":"Câu 21. Có 5 nam sinh và 3 nữ sinh cần được xếp vào một hàng dọc. Các mệnh đề sau đúng hay sai?","statements":[{"text":"Có 40320 cách xếp tùy ý.","isTrue":true},{"text":"Có 720 cách xếp sao cho học sinh cùng giới đứng cạnh nhau.","isTrue":false},{"text":"Có 4320 cách xếp sao cho học sinh nữ luôn đứng cạnh nhau.","isTrue":true},{"text":"Có 2880 cách xếp sao cho học sinh nam luôn đứng cạnh nhau.","isTrue":true}],"explanation":"a) \\( 8! = 40320 \\). b) Sai, vì \\( 5! \\times 3! \\times 2! = 1440 \\). c) Coi 3 nữ là 1 khối, \\( 3! \\times 6! = 4320 \\). d) Coi 5 nam là 1 khối, \\( 5! \\times 4! = 2880 \\)."},
{"type":"tf","q":"Câu 22. Một trường THPT X có 8 giáo viên Toán gồm có 3 nữ và 5 nam, giáo viên Vật lý thì có 4 giáo viên nam. Chọn ra một đoàn thanh tra công tác ôn thi tốt nghiệp THPT. Các mệnh đề sau đúng hay sai?","statements":[{"text":"Chọn 1 giáo viên nữ có \\( C_3^1 \\) cách.","isTrue":true},{"text":"Chọn 2 giáo viên nam môn Vật lý có \\( C_4^2 \\) cách.","isTrue":true},{"text":"Chọn 1 giáo viên nam môn Toán và 1 nam môn Vật lý có \\( C_5^1 + C_4^1 \\) cách.","isTrue":false},{"text":"Có 80 cách chọn ra một đoàn thanh tra gồm 3 người có đủ 2 môn Toán và Vật lý và phải có giáo viên nam và giáo viên nữ trong đoàn.","isTrue":false}],"explanation":"c) Sai vì phải dùng quy tắc nhân \\( C_5^1 \\times C_4^1 \\). d) Sai vì có 3 TH: (1 nữ Toán, 1 nam Toán, 1 nam Lý) + (1 nữ Toán, 2 nam Lý) + (2 nữ Toán, 1 nam Lý). Tổng là \\( 60 + 18 + 12 = 90 \\) cách."},
{"type":"short","q":"Câu 23. Cho hai đường thẳng song song \\( d_1 \\) và \\( d_2 \\). Trên \\( d_1 \\) lấy 17 điểm phân biệt, trên \\( d_2 \\) lấy 20 điểm phân biệt. Tính số tam giác có các đỉnh là 3 điểm trong số 37 điểm đã chọn trên \\( d_1 \\) và \\( d_2 \\).","correct":"5950","explanation":"TH1: 1 điểm thuộc \\( d_1 \\) và 2 điểm thuộc \\( d_2 \\) có \\( C_{17}^1 \\times C_{20}^2 = 3230 \\). TH2: 2 điểm thuộc \\( d_1 \\) và 1 điểm thuộc \\( d_2 \\) có \\( C_{17}^2 \\times C_{20}^1 = 2720 \\). Tổng có \\( 3230 + 2720 = 5950 \\) tam giác."},
{"type":"short","q":"Câu 24. Trong một tổ học sinh có 6 học sinh nữ và 10 học sinh nam. Hạnh là một trong 6 học sinh nữ, Huy là một trong 10 học sinh nam. Cô chủ nhiệm cần chọn ra 5 bạn trong tổ để tham gia hoạt động văn nghệ nhân ngày 20.11 sắp tới. Hỏi cô chủ nhiệm có bao nhiêu cách chọn trong đó có ít nhất 2 em Hạnh và Huy không được tham gia (tức là không đồng thời tham gia)?","correct":"4004","explanation":"Sử dụng phần bù. Số cách chọn ngẫu nhiên 5 bạn từ 16 bạn là \\( C_{16}^5 = 4368 \\). Số cách chọn 5 bạn mà có CẢ Hạnh và Huy là \\( 1 \\times C_{14}^3 = 364 \\). Vậy số cách chọn để Hạnh và Huy KHÔNG đồng thời tham gia là \\( 4368 - 364 = 4004 \\) cách."}
]

{"type":"mcq","q":"Câu 2. Từ các chữ số 1, 2, 3, 4, 5, 6 có thể lập được bao nhiêu số tự nhiên chẵn có 3 chữ số (các chữ số có thể giống nhau)?","a":["108","120","216","18"],"correct":0,"explanation":"Gọi số cần tìm là \\( \\overline{abc} \\). \\( c \\in \\{2, 4, 6\\} \\) có 3 cách chọn. \\( a, b \\) mỗi vị trí có 6 cách chọn. Tổng số: \\( 6 \\times 6 \\times 3 = 108 \\) số."},
{"type":"mcq","q":"Câu 3. Một người đi từ A đến B có 4 con đường, từ B đến C có 3 con đường. Hỏi có bao nhiêu cách đi từ A đến C qua B rồi quay về A qua B mà không đi lại đường cũ?","a":["72","144","12","24"],"correct":0,"explanation":"Lúc đi (A->B->C) có \\( 4 \\times 3 = 12 \\) cách. Lúc về (C->B->A) không đi đường cũ nên có \\( 2 \\times 3 = 6 \\) cách. Tổng cộng: \\( 12 \\times 6 = 72 \\) cách."},
{"type":"mcq","q":"Câu 4. Lớp 10A có 20 nam và 15 nữ. Có bao nhiêu cách chọn ra 1 bạn làm lớp trưởng?","a":["35","300","15","20"],"correct":0,"explanation":"Áp dụng quy tắc cộng, số cách chọn 1 học sinh bất kì trong lớp là \\( 20 + 15 = 35 \\) cách."},
{"type":"mcq","q":"Câu 5. Số lượng các ước số nguyên dương của 360 là bao nhiêu?","a":["24","12","18","30"],"correct":0,"explanation":"Phân tích ra thừa số nguyên tố: \\( 360 = 2^3 \\times 3^2 \\times 5^1 \\). Số ước dương là \\( (3+1)(2+1)(1+1) = 24 \\)."},
{"type":"mcq","q":"Câu 6. Có 10 người, cần chọn ra 3 người để phân công làm tổ trưởng, tổ phó và thư ký. Hỏi có bao nhiêu cách phân công?","a":["720","120","30","1000"],"correct":0,"explanation":"Chọn 3 người từ 10 người và có phân công chức vụ (có thứ tự) là chỉnh hợp chập 3 của 10: \\( A_{10}^3 = 720 \\)."},
{"type":"mcq","q":"Câu 7. Một tổ gồm 10 học sinh. Cần chọn ra 3 học sinh đi lao động vệ sinh. Hỏi có bao nhiêu cách chọn?","a":["120","720","30","3"],"correct":0,"explanation":"Chọn 3 người từ 10 người không phân biệt thứ tự là tổ hợp chập 3 của 10: \\( C_{10}^3 = 120 \\)."},
{"type":"mcq","q":"Câu 8. Có bao nhiêu cách xếp 6 học sinh thành một hàng dọc?","a":["720","120","36","6"],"correct":0,"explanation":"Số cách xếp 6 người vào 6 vị trí là một hoán vị của 6 phần tử: \\( 6! = 720 \\)."},
{"type":"mcq","q":"Câu 9. Một đa giác đều có 20 đỉnh. Số đường chéo của đa giác này là:","a":["170","190","380","400"],"correct":0,"explanation":"Số đoạn thẳng nối 2 đỉnh bất kì là \\( C_{20}^2 = 190 \\). Trừ đi 20 cạnh, số đường chéo là \\( 190 - 20 = 170 \\)."},
{"type":"mcq","q":"Câu 10. Đội văn nghệ của lớp có 5 bạn nam và 7 bạn nữ. Cô giáo cần chọn ra 4 bạn để biểu diễn, sao cho trong đội hình có đúng 2 bạn nam. Số cách chọn là:","a":["210","495","10","21"],"correct":0,"explanation":"Chọn 2 nam từ 5 nam có \\( C_5^2 = 10 \\) cách. Chọn 2 nữ từ 7 nữ có \\( C_7^2 = 21 \\) cách. Tổng số cách: \\( 10 \\times 21 = 210 \\)."},
{"type":"mcq","q":"Câu 11. Có 4 quyển sách Toán khác nhau và 3 quyển sách Lý khác nhau. Hỏi có bao nhiêu cách xếp chúng lên một giá sách hàng ngang sao cho các sách cùng môn đứng cạnh nhau?","a":["288","5040","144","72"],"correct":0,"explanation":"Coi sách Toán là 1 khối, sách Lý là 1 khối. Hoán vị 2 khối có \\( 2! \\) cách. Hoán vị nội bộ sách Toán có \\( 4! \\) cách, sách Lý có \\( 3! \\) cách. Tổng: \\( 2! \\times 4! \\times 3! = 288 \\)."},
{"type":"mcq","q":"Câu 12. Nghiệm của phương trình \\( A_n^2 = 30 \\) là:","a":["\\( n=6 \\)","\\( n=5 \\)","\\( n=7 \\)","\\( n=30 \\)"],"correct":0,"explanation":"Điều kiện \\( n \\ge 2 \\). Phương trình tương đương \\( \\frac{n!}{(n-2)!} = 30 \\Rightarrow n(n-1) = 30 \\Rightarrow n^2 - n - 30 = 0 \\Rightarrow n=6 \\)."},
{"type":"mcq","q":"Câu 13. Cô giáo có 10 phần quà giống nhau muốn chia cho 3 bạn học sinh sao cho mỗi bạn nhận được ít nhất 1 phần quà. Số cách chia là:","a":["36","120","84","27"],"correct":0,"explanation":"Theo bài toán chia kẹo Euler, số cách chia là tổ hợp chập \\( (3-1) \\) của \\( (10-1) \\), tức là \\( C_9^2 = 36 \\)."},
{"type":"mcq","q":"Câu 14. Từ tập \\( A = \\{1, 2, 3, 4, 5, 6, 7\\} \\) lập được bao nhiêu số tự nhiên gồm 4 chữ số khác nhau và luôn chứa chữ số 1?","a":["480","120","840","35"],"correct":0,"explanation":"Chọn vị trí cho chữ số 1 có 4 cách. Chọn 3 chữ số còn lại từ 6 chữ số và xếp vào 3 vị trí trống có \\( A_6^3 = 120 \\). Tổng: \\( 4 \\times 120 = 480 \\)."},
{"type":"mcq","q":"Câu 15. Cho 8 điểm phân biệt nằm trên một đường tròn. Từ các điểm này có thể lập được bao nhiêu tam giác nội tiếp đường tròn?","a":["56","336","24","512"],"correct":0,"explanation":"Mỗi tam giác được tạo bởi 3 điểm bất kỳ trong 8 điểm (không có 3 điểm nào thẳng hàng). Số tam giác là \\( C_8^3 = 56 \\)."},
{"type":"mcq","q":"Câu 16. Có 5 bông hoa hồng khác nhau và 4 bông hoa cúc khác nhau. Số cách chọn ra 3 bông hoa trong đó có ít nhất 1 bông hoa hồng là:","a":["80","84","4","40"],"correct":0,"explanation":"Tổng số cách chọn 3 bông hoa là \\( C_9^3 = 84 \\). Số cách chọn 3 bông toàn hoa cúc là \\( C_4^3 = 4 \\). Số cách chọn có ít nhất 1 hoa hồng là \\( 84 - 4 = 80 \\)."},
{"type":"mcq","q":"Câu 17. Một hộp chứa 3 viên bi đỏ, 4 viên bi xanh, 5 viên bi vàng (các viên bi kích thước đôi một khác nhau). Có bao nhiêu cách lấy ra 3 viên bi sao cho có đủ 3 màu?","a":["60","220","12","15"],"correct":0,"explanation":"Lấy 1 bi đỏ (3 cách), 1 bi xanh (4 cách), 1 bi vàng (5 cách). Theo quy tắc nhân: \\( 3 \\times 4 \\times 5 = 60 \\) cách."},
{"type":"mcq","q":"Câu 18. Có bao nhiêu cách xếp 5 người ngồi vào một bàn tròn có 5 ghế (biết hai cách xếp được coi là như nhau nếu qua phép quay bàn ta được cùng một vị trí tương đối)?","a":["24","120","5","60"],"correct":0,"explanation":"Số cách xếp \\( n \\) người vào bàn tròn \\( n \\) chỗ là hoán vị vòng quanh: \\( P_n = (n-1)! \\). Với \\( n=5 \\) thì có \\( 4! = 24 \\) cách."},
{"type":"mcq","q":"Câu 19. Cho 10 đường thẳng phân biệt. Số giao điểm tối đa mà 10 đường thẳng này có thể tạo ra là:","a":["45","90","100","20"],"correct":0,"explanation":"Số giao điểm tối đa đạt được khi cứ 2 đường thẳng cắt nhau tạo ra 1 giao điểm và không có 3 đường nào đồng quy. Số giao điểm là \\( C_{10}^2 = 45 \\)."},
{"type":"mcq","q":"Câu 20. Một lớp có 15 học sinh khá và 20 học sinh trung bình. Số cách chọn ra 4 học sinh sao cho có ít nhất 1 học sinh khá là:","a":["47515","52360","4845","23500"],"correct":0,"explanation":"Tổng số cách chọn 4 bạn từ 35 bạn là \\( C_{35}^4 = 52360 \\). Số cách chọn 4 bạn toàn trung bình là \\( C_{20}^4 = 4845 \\). Số cách chọn có ít nhất 1 học sinh khá: \\( 52360 - 4845 = 47515 \\)."},
{"type":"tf","q":"Câu 21. Cho tập hợp A có 10 phần tử. Các mệnh đề sau đúng hay sai?","statements":[{"text":"Số tập con gồm 2 phần tử của A là \\( A_{10}^2 \\).","isTrue":false},{"text":"Số chỉnh hợp chập 3 của 10 phần tử là 720.","isTrue":true},{"text":"Số hoán vị của 10 phần tử là \\( 10! \\).","isTrue":true},{"text":"Ta có đẳng thức \\( C_{10}^4 = C_{10}^6 \\).","isTrue":true}],"explanation":"a) Sai, số tập con là tổ hợp \\( C_{10}^2 \\). b) Đúng, \\( A_{10}^3 = 10 \\times 9 \\times 8 = 720 \\). c) Đúng theo định nghĩa hoán vị. d) Đúng, theo tính chất \\( C_n^k = C_n^{n-k} \\)."},
{"type":"tf","q":"Câu 22. Một hộp có 5 viên bi xanh, 4 viên bi đỏ và 3 viên bi vàng (các viên bi đôi một khác nhau). Lấy ngẫu nhiên 3 viên bi. Các mệnh đề sau đúng hay sai?","statements":[{"text":"Số cách lấy 3 viên bi bất kỳ là \\( C_{12}^3 \\).","isTrue":true},{"text":"Số cách lấy 3 viên bi cùng màu là \\( C_5^3 + C_4^3 + C_3^3 \\).","isTrue":true},{"text":"Số cách lấy 3 viên bi có đủ 3 màu là \\( 5 + 4 + 3 \\).","isTrue":false},{"text":"Số cách lấy 3 viên bi không có bi vàng là \\( C_{12}^3 - C_3^3 \\).","isTrue":false}],"explanation":"c) Sai, phải dùng quy tắc nhân: \\( 5 \\times 4 \\times 3 = 60 \\) cách. d) Sai, số bi không phải vàng là \\( 5+4=9 \\) viên. Lấy 3 bi không vàng phải là \\( C_9^3 \\)."},
{"type":"short","q":"Câu 23. Có bao nhiêu cách chia 8 đội bóng thành 4 bảng đấu, mỗi bảng gồm đúng 2 đội?","correct":"105","explanation":"Chia làm 4 bảng không phân biệt thứ tự bảng: \\( \\frac{C_8^2 \\times C_6^2 \\times C_4^2 \\times C_2^2}{4!} = \\frac{28 \\times 15 \\times 6 \\times 1}{24} = 105 \\) cách."},
{"type":"short","q":"Câu 24. Lớp 11A có 35 học sinh, trong đó có 20 nam và 15 nữ. Có bao nhiêu cách chọn 5 bạn đi trực nhật sao cho số lượng nam nhiều hơn số lượng nữ?","correct":"207879","explanation":"Các trường hợp thỏa mãn (nam lớn hơn nữ): 3 nam 2 nữ (\\( C_{20}^3 \\times C_{15}^2 = 119700 \\)), 4 nam 1 nữ (\\( C_{20}^4 \\times C_{15}^1 = 72675 \\)), 5 nam 0 nữ (\\( C_{20}^5 = 15504 \\)). Tổng: \\( 119700 + 72675 + 15504 = 207879 \\) cách."}
]

{"type":"mcq","q":"Câu 2. Xét vị trí tương đối của hai đường thẳng \\( d_1 : \\begin{cases} x = -1 + t \\\\ y = -2 - 2t \\end{cases} \\) và đường thẳng \\( d_2 : \\begin{cases} x = 2 - 2t' \\\\ y = -8 + 4t' \\end{cases} \\). ","a":["Trùng nhau","Song song","Vuông góc với nhau","Cắt nhau nhưng không vuông góc"],"correct":0,"explanation":"Ta có \\(\\overrightarrow{u_1}=(1; -2)\\) là một vectơ chỉ phương của \\(d_1\\) và \\(\\overrightarrow{u_2}=(-2; 4)\\) là một vectơ chỉ phương của \\(d_2\\). Vì \\(\\overrightarrow{u_1}\\) cùng phương \\(\\overrightarrow{u_2} \\) và mọi điểm thuộc \\(d_1\\) đều thuộc \\(d_2\\) nên \\(d_1\\) trùng \\(d_2\\)."},
{"type":"mcq","q":"Câu 3. Xét vị trí tương đối của hai đường thẳng \\( d_1 : \\begin{cases} x = -3 + 4t \\\\ y = 2 - 6t \\end{cases} \\) và đường thẳng \\( d_2 : \\begin{cases} x = 2 - 2t' \\\\ y = -8 + 4t' \\end{cases} \\).","a":["Trùng nhau","Song song","Vuông góc với nhau","Cắt nhau nhưng không vuông góc"],"correct":3,"explanation":"Ta có \\(\\overrightarrow{u_1}=(4; -6)\\) là một vectơ chỉ phương của \\(d_1\\) và \\(\\overrightarrow{u_2}=(-2; 4)\\) là một vectơ chỉ phương của \\(d_2\\). Vì \\(\\overrightarrow{u_1}\\) không cùng phương \\(\\overrightarrow{u_2} \\) nên \\(d_1\\) cắt \\(d_2\\)"},
{"type": "mcq", "q": "Câu 4. Xác định vị trí tương đối của hai đường thẳng \\( \\Delta_1: 7x + 2y - 1 = 0 \\) và \\( \\Delta_2: \\begin{cases} x = 4 + t \\\\ y = 1 - 5t \\end{cases} \\)", "a": ["Trùng nhau.", "Song song.", "Vuông góc với nhau.", "Cắt nhau nhưng không vuông góc nhau."], "correct": 3, "explanation": "Vectơ pháp tuyến của \\( \\Delta_1 \\) là \\( \\vec{n}_1=(7;2) \\). Vectơ chỉ phương của \\( \\Delta_2 \\) là \\( \\vec{u}_2=(1;-5) \\Rightarrow \\vec{n}_2=(5;1) \\). Vì \\( \\frac{7}{5} \\neq \\frac{2}{1} \\) nên cắt nhau, và tích vô hướng \\( 7(5)+2(1) \\neq 0 \\) nên không vuông góc."},
{"type": "mcq", "q": "Câu 5. Cho hai đường thẳng \\( d_1: \\begin{cases} x = 2 + t \\\\ y = -3 + 2t \\end{cases} (t \\in \\mathbb{R}) \\) và \\( d_2: \\begin{cases} x = 5 - m \\\\ y = -7 + 3m \\end{cases} (m \\in \\mathbb{R}) \\). Khẳng định nào sau đây đúng?", "a": ["\\( d_1 \\) song song \\( d_2 \\).", "\\( d_1 \\) và \\( d_2 \\) cắt nhau tại \\( M(1; -3) \\).", "\\( d_1 \\) trùng với \\( d_2 \\).", "\\( d_1 \\) và \\( d_2 \\) cắt nhau tại \\( M(3; -1) \\)."], "correct": 3, "explanation": "Hệ phương trình hoành độ và tung độ: \\( 2+t = 5-m \\) và \\( -3+2t = -7+3m \\) cho nghiệm \\( t=1, m=2 \\). Thay \\( t=1 \\) vào \\( d_1 \\) ta được giao điểm \\( M(3; -1) \\)."},
{"type": "mcq", "q": "Câu 6. Cho bốn điểm \\( A(4; -3), B(5; 1), C(2; 3) \\) và \\( D(-2; 2) \\). Xác định vị trí tương đối của hai đường thẳng \\( AB \\) và \\( CD \\).", "a": ["Trùng nhau.", "Song song.", "Vuông góc với nhau.", "Cắt nhau nhưng không vuông góc nhau."], "correct": 3, "explanation": "Ta có \\( \\vec{AB} = (1; 4) \\), \\( \\vec{CD} = (-4; -1) \\). Vì \\( \\frac{1}{-4} \\neq \\frac{4}{-1} \\) (không cùng phương) và tích vô hướng \\( 1(-4) + 4(-1) = -8 \\neq 0 \\) nên hai đường thẳng cắt nhau nhưng không vuông góc."},
{"type": "mcq", "q": "Câu 7. Các cặp đường thẳng nào sau đây vuông góc với nhau?", "a": ["\\( d_1: \\begin{cases} x = t \\\\ y = -1 - 2t \\end{cases} \\) và \\( d_2: 2x + y - 1 = 0 \\).", "\\( d_1: x - 2 = 0 \\) và \\( d_2: \\begin{cases} x = t \\\\ y = 0 \\end{cases} \\).", "\\( d_1: 2x - y + 3 = 0 \\) và \\( d_2: x - 2y + 1 = 0 \\).", "\\( d_1: 2x - y + 3 = 0 \\) và \\( d_2: 4x - 2y + 1 = 0 \\)."], "correct": 1, "explanation": "Đường thẳng \\( d_1 \\) có VTPT \\( \\vec{n}_1 = (1; 0) \\), đường thẳng \\( d_2 \\) có VTCP \\( \\vec{u}_2 = (1; 0) \\Rightarrow \\vec{n}_2 = (0; 1) \\). Tích vô hướng \\( \\vec{n}_1 \\cdot \\vec{n}_2 = 1 \\cdot 0 + 0 \\cdot 1 = 0 \\) nên chúng vuông góc với nhau."},
{"type": "mcq", "q": "Câu 8. Đường thẳng nào sau đây song song với đường thẳng \\( 2x + 3y - 1 = 0 \\)?", "a": ["\\( 2x + 3y + 1 = 0 \\).", "\\( x - 2y + 5 = 0 \\).", "\\( 2x - 3y + 3 = 0 \\).", "\\( 2x - 3y - 1 = 0 \\)."], "correct": 0, "explanation": "Hai đường thẳng song song có cùng vectơ pháp tuyến. Phương trình sẽ có dạng \\( 2x + 3y + C = 0 \\) (với \\( C \\neq -1 \\)), đáp án A thỏa mãn."},
{"type": "mcq", "q": "Câu 9. Đường thẳng nào sau đây không có điểm chung với đường thẳng \\( x - 3y + 4 = 0 \\)?", "a": ["\\( \\begin{cases} x = 1 + t \\\\ y = 2 + 3t \\end{cases} \\)", "\\( \\begin{cases} x = 1 - t \\\\ y = 2 + 3t \\end{cases} \\)", "\\( \\begin{cases} x = 1 - 3t \\\\ y = 2 + t \\end{cases} \\)", "\\( \\begin{cases} x = 1 - 3t \\\\ y = 2 - t \\end{cases} \\)"], "correct": 3, "explanation": "Đường thẳng ban đầu có VTCP \\( \\vec{u} = (3; 1) \\). Không có điểm chung tức là song song. Đáp án D có VTCP \\( \\vec{u}_D = (-3; -1) \\) cùng phương với \\( \\vec{u} \\), đồng thời điểm \\( (1; 2) \\) của nó khi thay vào phương trình đầu tiên cho \\( 1 - 6 + 4 \\neq 0 \\) (không trùng)."},
{"type": "mcq", "q": "Câu 10. Đường thẳng nào sau đây vuông góc với đường thẳng \\( 4x - 3y + 1 = 0 \\)?", "a": ["\\( \\begin{cases} x = 4t \\\\ y = -3 - 3t \\end{cases} \\)", "\\( \\begin{cases} x = 4t \\\\ y = -3 + 3t \\end{cases} \\)", "\\( \\begin{cases} x = -4t \\\\ y = -3 - 3t \\end{cases} \\)", "\\( \\begin{cases} x = 8t \\\\ y = -3 + t \\end{cases} \\)"], "correct": 0, "explanation": "Đường thẳng ban đầu có VTPT \\( \\vec{n} = (4; -3) \\). Đường thẳng vuông góc sẽ nhận VTPT này làm VTCP. Đáp án A có VTCP \\( \\vec{u} = (4; -3) \\) thỏa mãn điều kiện."},
{"type": "mcq", "q": "Câu 11. Đường thẳng nào sau đây có vô số điểm chung với đường thẳng \\( \\begin{cases} x = t \\\\ y = -1 \\end{cases} \\)?", "a": ["\\( \\begin{cases} x = 0 \\\\ y = -1 + 2018t \\end{cases} \\)", "\\( \\begin{cases} x = -1 + t \\\\ y = 0 \\end{cases} \\)", "\\( \\begin{cases} x = -1 + 2018t \\\\ y = -1 \\end{cases} \\)", "\\( \\begin{cases} x = 1 \\\\ y = -1 + t \\end{cases} \\)"], "correct": 2, "explanation": "Hai đường thẳng có vô số điểm chung khi chúng trùng nhau. Phương trình ban đầu là đường thẳng nằm ngang \\( y = -1 \\). Đáp án C cũng biểu thị đường thẳng \\( y = -1 \\)."},
{"type": "mcq", "q": "Câu 12. Đường thẳng nào sau đây có đúng một điểm chung với đường thẳng \\( \\begin{cases} x = -2 + 3t \\\\ y = 5 - 7t \\end{cases} \\)?", "a": ["\\( 7x + 3y - 1 = 0 \\).", "\\( 7x + 3y + 1 = 0 \\).", "\\( 3x - 7y + 2018 = 0 \\).", "\\( 7x + 3y + 2018 = 0 \\)."], "correct": 2, "explanation": "Đường thẳng ban đầu có phương trình tổng quát là \\( 7x + 3y - 1 = 0 \\). Để cắt nhau (có đúng 1 điểm chung), hai VTPT không được cùng phương. Đáp án C có VTPT \\( \\vec{n}=(3;-7) \\) không cùng phương với \\( (7;3) \\)."},
{"type": "mcq", "q": "Câu 13. Tìm \\( m \\) để hai đường thẳng \\( d_1: 3x + 4y + 10 = 0 \\) và \\( d_2: (2m - 1)x + m^2y + 10 = 0 \\) trùng nhau.", "a": ["\\( m = \\pm 2 \\).", "\\( m = \\pm 1 \\).", "\\( m = 2 \\).", "\\( m = -2 \\)."], "correct": 2, "explanation": "Hai đường thẳng trùng nhau khi và chỉ khi các hệ số tỉ lệ với nhau: \\( \\frac{2m-1}{3} = \\frac{m^2}{4} = \\frac{10}{10} = 1 \\). Giải hệ phương trình ta được \\( m = 2 \\)."},
{"type": "mcq", "q": "Câu 14. Tìm \\( m \\) để hai đường thẳng \\( d_1: mx + (m - 1)y + 2m = 0 \\) và \\( d_2: 2x + y - 1 = 0 \\) song song với nhau.", "a": ["\\( m = 2 \\).", "\\( m = -1 \\).", "\\( m = -2 \\).", "\\( m = 1 \\)."], "correct": 0, "explanation": "Điều kiện song song là \\( \\frac{m}{2} = \\frac{m-1}{1} \\neq \\frac{2m}{-1} \\). Giải phương trình đầu ta có \\( m = 2(m-1) \\Rightarrow m = 2 \\). Kiểm tra thỏa mãn điều kiện khác."},
{"type": "mcq", "q": "Câu 15. Trong mặt phẳng tọa độ \\( Oxy \\), cho hai đường thẳng có phương trình \\( d_1: mx + (m - 1)y + 2m = 0 \\) và \\( d_2: 2x + y - 1 = 0 \\). Nếu \\( d_1 \\) song song \\( d_2 \\) thì", "a": ["\\( m = 2 \\).", "\\( m = -1 \\).", "\\( m = -2 \\).", "\\( m = 1 \\)."], "correct": 0, "explanation": "Tương tự câu trước, ta xét tỉ lệ \\( \\frac{m}{2} = \\frac{m-1}{1} \\neq \\frac{2m}{-1} \\). Giải ra được \\( m = 2 \\)."},
{"type": "mcq", "q": "Câu 16. Tìm \\( m \\) để hai đường thẳng \\( d_1: 2x - 3y + 4 = 0 \\) và \\( d_2: \\begin{cases} x = 2 - 3t \\\\ y = 1 - 4mt \\end{cases} \\) cắt nhau.", "a": ["\\( m \\neq -\\frac{1}{2} \\).", "\\( m \\neq 2 \\).", "\\( m \\neq \\frac{1}{2} \\).", "\\( m = \\frac{1}{2} \\)."], "correct": 2, "explanation": "\\( d_1 \\) có VTCP \\( \\vec{u}_1 = (3; 2) \\), \\( d_2 \\) có VTCP \\( \\vec{u}_2 = (-3; -4m) \\). Để cắt nhau thì 2 VTCP không cùng phương: \\( \\frac{3}{-3} \\neq \\frac{2}{-4m} \\Rightarrow m \\neq \\frac{1}{2} \\)."},
{"type": "mcq", "q": "Câu 17. Với giá trị nào của \\( a \\) thì hai đường thẳng \\( d_1: 2x - 4y + 1 = 0 \\) và \\( d_2: \\begin{cases} x = -1 + at \\\\ y = 3 - (a + 1)t \\end{cases} \\) vuông góc với nhau?", "a": ["\\( a = -2 \\).", "\\( a = 2 \\).", "\\( a = -1 \\).", "\\( a = 1 \\)."], "correct": 3, "explanation": "\\( d_1 \\) có VTCP \\( \\vec{u}_1 = (4; 2) \\). \\( d_2 \\) có VTCP \\( \\vec{u}_2 = (a; -a-1) \\). Hai đường vuông góc khi \\( \\vec{u}_1 \\cdot \\vec{u}_2 = 0 \\Rightarrow 4a + 2(-a-1) = 0 \\Rightarrow 2a - 2 = 0 \\Rightarrow a = 1 \\)."},
{"type": "mcq", "q": "Câu 18. Tìm tất cả các giá trị của \\( m \\) để hai đường thẳng \\( d_1: \\begin{cases} x = 2 + 2t \\\\ y = 1 + mt \\end{cases} \\) và \\( d_2: 4x - 3y + m = 0 \\) trùng nhau.", "a": ["\\( m = -3 \\).", "\\( m = 1 \\).", "\\( m = \\frac{4}{3} \\).", "Không có \\( m \\)."], "correct": 3, "explanation": "Thay tham số \\( t \\) từ \\( d_1 \\) vào \\( d_2 \\): \\( 4(2+2t) - 3(1+mt) + m = 0 \\Leftrightarrow t(8-3m) + m + 5 = 0 \\). Để trùng nhau, phương trình phải đúng với mọi \\( t \\), suy ra \\( 8-3m=0 \\) và \\( m+5=0 \\), vô nghiệm."},
{"type": "mcq", "q": "Câu 19. Tìm tất cả các giá trị của \\( m \\) để hai đường thẳng \\( \\Delta_1: 2x - 3my + 10 = 0 \\) và \\( \\Delta_2: mx + 4y + 1 = 0 \\) cắt nhau.", "a": ["\\( 1 < m < 10 \\).", "\\( m = 1 \\).", "Không có \\( m \\).", "Với mọi \\( m \\)."], "correct": 3, "explanation": "Hai đường thẳng cắt nhau khi tỉ số hệ số không bằng nhau: định thức \\( D = 2(4) - (-3m)m = 3m^2 + 8 \\neq 0 \\). Điều này luôn đúng với mọi giá trị của \\( m \\) vì \\( 3m^2 + 8 > 0 \\)."},
{"type": "mcq", "q": "Câu 20. Tìm giá trị \\( m \\) để hai đường thẳng \\( \\Delta_1: mx + y - 19 = 0 \\) và \\( \\Delta_2: (m - 1)x + (m + 1)y - 20 = 0 \\) vuông góc?", "a": ["Với mọi \\( m \\).", "\\( m = 2 \\).", "Không có \\( m \\).", "\\( m = \\pm 1 \\)."], "correct": 2, "explanation": "Tích vô hướng của 2 VTPT phải bằng 0: \\( m(m-1) + 1(m+1) = 0 \\Leftrightarrow m^2 + 1 = 0 \\). Phương trình này vô nghiệm, do đó không có \\( m \\) nào thỏa mãn."},
{"type": "mcq", "q": "Câu 21. Tìm tọa độ giao điểm của đường thẳng \\( \\Delta: 5x + 2y - 10 = 0 \\) và trục hoành.", "a": ["\\( (0; 2) \\).", "\\( (0; 5) \\).", "\\( (2; 0) \\).", "\\( (-2; 0) \\)."], "correct": 2, "explanation": "Trục hoành có phương trình \\( y = 0 \\). Thay \\( y = 0 \\) vào phương trình \\( \\Delta \\), ta được \\( 5x - 10 = 0 \\Rightarrow x = 2 \\). Tọa độ giao điểm là \\( (2; 0) \\)."},
{"type": "mcq", "q": "Câu 22. Phương trình của đường thẳng \\( \\Delta \\) đi qua giao điểm của hai đường thẳng \\( d_1: x + 3y - 1 = 0 \\), \\( d_2: x - 3y - 5 = 0 \\) và vuông góc với đường thẳng \\( d_3: 2x - y + 7 = 0 \\) là", "a": ["\\( 3x + 6y - 5 = 0 \\).", "\\( 6x + 12y - 5 = 0 \\).", "\\( 6x + 12y + 10 = 0 \\).", "\\( x + 2y + 10 = 0 \\)."], "correct": 0, "explanation": "Giao điểm của \\( d_1, d_2 \\) là nghiệm hệ phương trình, giải được điểm \\( M(3; -\\frac{2}{3}) \\). Đường thẳng \\( \\Delta \\perp d_3 \\) nên có VTPT \\( \\vec{n}=(1; 2) \\). Phương trình \\( \\Delta: 1(x-3) + 2(y+\\frac{2}{3}) = 0 \\Leftrightarrow 3x + 6y - 5 = 0 \\)."},
{"type": "mcq", "q": "Câu 23. Trong mặt phẳng với hệ tọa độ \\( Oxy \\), cho ba đường thẳng lần lượt có phương trình \\( d_1: 3x - 4y + 15 = 0 \\), \\( d_2: 5x + 2y - 1 = 0 \\) và \\( d_3: mx - (2m - 1)y + 9m - 13 = 0 \\). Tìm tất cả các giá trị của tham số \\( m \\) để ba đường thẳng đã cho cùng đi qua một điểm.", "a": ["\\( m = \\frac{1}{5} \\).", "\\( m = -5 \\).", "\\( m = -\\frac{1}{5} \\).", "\\( m = 5 \\)."], "correct": 3, "explanation": "Giao điểm của \\( d_1, d_2 \\) là \\( I(-1; 3) \\). Để ba đường đồng quy thì điểm \\( I \\) phải thuộc \\( d_3 \\). Thay \\( x=-1, y=3 \\) vào \\( d_3 \\) ta có \\( -m - 3(2m-1) + 9m - 13 = 0 \\Leftrightarrow 2m - 10 = 0 \\Leftrightarrow m = 5 \\)."},
{"type": "mcq", "q": "Câu 24. Đường thẳng \\( d: 51x - 30y + 11 = 0 \\) đi qua điểm nào sau đây?", "a": ["\\( M\\left(-1; -\\frac{4}{3}\\right) \\).", "\\( N\\left(-1; \\frac{4}{3}\\right) \\).", "\\( P\\left(1; \\frac{3}{4}\\right) \\).", "\\( Q\\left(-1; -\\frac{3}{4}\\right) \\)."], "correct": 0, "explanation": "Thay tọa độ từng điểm vào phương trình đường thẳng. Xét điểm \\( M \\): \\( 51(-1) - 30\\left(-\\frac{4}{3}\\right) + 11 = -51 + 40 + 11 = 0 \\). Vậy điểm \\( M \\) thuộc đường thẳng."},
{"type": "short", "q": "Câu 25. Với giá trị nào của \\( m \\) thì ba đường thẳng \\( d_1: 3x - 4y + 15 = 0 \\), \\( d_2: 5x + 2y - 1 = 0 \\) và \\( d_3: mx - 4y + 15 = 0 \\) đồng quy.", "correct": "3", "explanation": "Giao điểm của \\( d_1, d_2 \\) (giống câu 23) là \\( I(-1; 3) \\). Thay \\( I \\) vào \\( d_3 \\): \\( m(-1) - 4(3) + 15 = 0 \\Leftrightarrow -m + 3 = 0 \\Leftrightarrow m = 3 \\)."},
{"type": "mcq", "q": "Câu 26. Điểm nào sau đây không thuộc đường thẳng \\( d: \\begin{cases} x = -1 + 2t \\\\ y = 3 - 5t \\end{cases} \\)?", "a": ["\\( M(-1; 3) \\).", "\\( N(1; -2) \\).", "\\( P(3; 1) \\).", "\\( Q(-3; 8) \\)."], "correct": 2, "explanation": "Thay tọa độ điểm \\( P(3; 1) \\) vào phương trình \\( d \\), từ phương trình trên suy ra \\( t = 2 \\), từ phương trình dưới suy ra \\( t = \\frac{2}{5} \\). Hai giá trị \\( t \\) không bằng nhau nên \\( P \\) không thuộc đường thẳng."},
{"type": "mcq", "q": "Câu 27. Trong mặt phẳng với hệ tọa độ \\( Oxy \\), cho tam giác \\( ABC \\) có \\( A(1; 3), B(-2; 4) \\) và \\( C(-1; 5) \\). Đường thẳng \\( d: 2x - 3y + 6 = 0 \\) cắt cạnh nào của tam giác đã cho?", "a": ["Cạnh \\( AC \\).", "Cạnh \\( AB \\).", "Cạnh \\( BC \\).", "Không cạnh nào."], "correct": 3, "explanation": "Xét hàm \\( F(x, y) = 2x - 3y + 6 \\). Ta có \\( F(A) = -1 < 0 \\); \\( F(B) = -10 < 0 \\); \\( F(C) = -11 < 0 \\). Vì cả ba điểm A, B, C đều có cùng dấu \\( F \\) nên cùng nằm một phía của \\( d \\). Do đó, \\( d \\) không cắt cạnh nào của tam giác."}
]
    }

        let currentUser = null, questions = [], currentIdx = 0, userAnswers = {}, timeLeft = 0, timerInterval = null, currentMode = "", cheatCount = 0;
        let globalHistoryList = [];

        const picker = document.getElementById("examPicker");
        Object.keys(allExams).forEach(name => {
            let opt = document.createElement("option"); opt.value = name; opt.innerText = name; picker.appendChild(opt);
        });

        // --- THEO DÕI THOÁT TAB (Chỉ hoạt động khi đang làm bài) ---
        document.addEventListener("visibilitychange", () => {
            const isQuizScreen = document.getElementById("screen-quiz").classList.contains("active");
            if (document.hidden && currentMode === 'exam' && isQuizScreen) {
                cheatCount++;
                if (cheatCount >= 2) {
                    alert("Em đã thoát tab 2 lần. Hệ thống tự động nộp bài!");
                    finish(); 
                } else {
                    alert("CẢNH BÁO: Không được rời trang khi đang thi! Thoát tab lần nữa hệ thống sẽ tự nộp bài.");
                    update(ref(db, `students/${currentUser.fullName}`), { cheats: cheatCount });
                }
            }
        });

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(window.MathJax) MathJax.typesetPromise();
        };

        window.handleLogin = async () => {
            const u = document.getElementById("loginUser").value.trim().toLowerCase();
            const p = document.getElementById("loginPass").value.trim();
            const snap = await get(ref(db, 'accounts/' + u));
            if(snap.exists() && snap.val().password === p) {
                currentUser = { username: u, fullName: snap.val().fullName };
                document.getElementById("welcome-text").innerText = `Chào em, ${currentUser.fullName}!`;
                showScreen('screen-dashboard');
            } else alert("Sai thông tin đăng nhập!");
        };

        window.startMode = (mode) => {
            const examData = allExams[picker.value];
            questions = examData.questions; currentMode = mode; currentIdx = 0; userAnswers = {}; cheatCount = 0; timeLeft = examData.time * 60;
            if(mode === 'exam' && prompt("Mã phòng thi:") !== "TOAN2026") return;
            if(mode === 'exam') update(ref(db, `students/${currentUser.fullName}`), { examName: picker.value, totalQ: questions.length, status: "Đang làm", score: 0, cheats: 0 });
            showScreen('screen-quiz'); renderQuestion(); renderGrid(); startTimer();
        };

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById("timer").innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if(timeLeft <= 0) { clearInterval(timerInterval); finish(); }
            }, 1000);
        }

        function renderGrid() {
            const grid = document.getElementById("question-grid"); grid.innerHTML = "";
            questions.forEach((_, i) => {
                const box = document.createElement("div"); box.className = "q-box";
                if (i === currentIdx) box.classList.add("current");
                if (userAnswers[i] !== undefined) box.classList.add("answered");
                box.innerText = i + 1; box.onclick = () => { currentIdx = i; renderQuestion(); renderGrid(); };
                grid.appendChild(box);
            });
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            document.getElementById("quiz-title").innerText = picker.value;
            document.getElementById("question-count").innerText = `Câu ${currentIdx + 1}/${questions.length}`;
            document.getElementById("question-text").innerHTML = q.q;
            let html = ""; const savedAns = userAnswers[currentIdx];
            if(q.type === "mcq") {
                q.a.forEach((ans, i) => html += `<button class="mcq-option ${savedAns === i ? "selected" : ""}" onclick="saveAns(${i})">${ans}</button>`);
            } else if(q.type === "tf") {
                html += `<table class="tf-table"><tr><th>Mệnh đề</th><th>Đ</th><th>S</th></tr>`;
                q.statements.forEach((s, i) => html += `<tr><td style="text-align:left;">${s.text}</td><td><input type="radio" name="tf-${i}" value="true" ${savedAns && savedAns[i]==="true"?"checked":""} onchange="saveTF(${i}, 'true')"></td><td><input type="radio" name="tf-${i}" value="false" ${savedAns && savedAns[i]==="false"?"checked":""} onchange="saveTF(${i}, 'false')"></td></tr>`);
                html += `</table>`;
            } else {
                html = `<input type="text" value="${savedAns||""}" style="text-align:center; font-weight:bold;" oninput="saveShort(this.value)">`;
            }
            document.getElementById("interactive-area").innerHTML = html;
            if(window.MathJax) MathJax.typesetPromise();
        }

        window.saveAns = (i) => { userAnswers[currentIdx] = i; sync(); renderQuestion(); renderGrid(); };
        window.saveShort = (v) => { userAnswers[currentIdx] = v.trim(); sync(); renderGrid(); };
        window.saveTF = (idx, v) => { if(!userAnswers[currentIdx]) userAnswers[currentIdx] = {}; userAnswers[currentIdx][idx] = v; sync(); renderGrid(); };

        function sync() {
            if(currentMode !== 'exam') return;
            let sc = 0; const cM = questions.filter(q => q.type === 'mcq').length || 1, cT = questions.filter(q => q.type === 'tf').length || 1, cS = questions.filter(q => q.type === 'short').length || 1;
            questions.forEach((q, i) => {
                let e = 0; const u = userAnswers[i];
                if(q.type==="mcq" && u===q.correct) e = 5/cM;
                else if(q.type==="tf") { let cp=0; q.statements.forEach((st, si) => { if(u && u[si]===st.isTrue.toString()) cp++; }); e = (cp/q.statements.length)*(3/cT); }
                else if(q.type==="short" && u && u.toLowerCase()===q.correct.toLowerCase()) e = 2/cS;
                sc += e;
            });
            update(ref(db, `students/${currentUser.fullName}`), { score: sc.toFixed(2) });
        }

        window.changeQuestion = (s) => { let n = currentIdx + s; if(n>=0 && n<questions.length) { currentIdx = n; renderQuestion(); renderGrid(); } };
        window.confirmFinish = () => { if(confirm("Nộp bài?")) finish(); };

        window.finish = () => {
            clearInterval(timerInterval);
            let sc = 0, historyArr = [];
            const cM = questions.filter(q => q.type === 'mcq').length || 1, cT = questions.filter(q => q.type === 'tf').length || 1, cS = questions.filter(q => q.type === 'short').length || 1;
            questions.forEach((q, i) => {
                let e = 0, sA = "Chưa làm", cA = ""; const u = userAnswers[i];
                if(q.type==="mcq") { cA = q.a[q.correct]; if(u!==undefined) { sA=q.a[u]; if(u===q.correct) e=5/cM; } }
                else if(q.type==="tf") { 
                    let cp=0, sa=[], ca=[]; q.statements.forEach((st, si) => { const uv=u?u[si]:null; if(uv===st.isTrue.toString()) cp++; sa.push(uv?(uv==="true"?"Đ":"S"):"_"); ca.push(st.isTrue?"Đ":"S"); }); 
                    e=(cp/q.statements.length)*(3/cT); cA=ca.join("|"); if(u) sA=sa.join("|"); 
                } else { cA = q.correct; if(u) { sA=u; if(u.toLowerCase()===q.correct.toLowerCase()) e=2/cS; } }
                sc += e; historyArr.push({ qText: q.q, sAns: sA, cAns: cA, earned: e, explanation: q.explanation });
            });
            const fS = parseFloat(sc.toFixed(2));
            renderResultPage(historyArr, fS); 
            showScreen('screen-result');
            update(ref(db, `students/${currentUser.fullName}`), { status: "Xong", score: fS, detailAnswers: historyArr });
            push(ref(db, `history_all/${currentUser.username}`), { date: new Date().toLocaleString(), score: fS, details: historyArr, examName: picker.value });
            currentMode = ""; // Reset mode
        }

        function renderResultPage(h, s) {
            document.getElementById("score-text").innerText = s;
            let html = "";
            h.forEach((item, i) => {
                let tag = "";
                if (item.sAns === "Chưa làm") tag = '<span style="color:gray; font-weight:bold;">(Chưa làm)</span>';
                else if (item.earned > 0) tag = '<span style="color:green; font-weight:bold;">✔ Đúng</span>';
                else tag = '<span style="color:red; font-weight:bold;">✘ Sai</span>';
                
                html += `<div class="review-box">
                    <b>Câu ${i+1}:</b> ${item.qText} ${tag}<br>
                    Em chọn: <b>${item.sAns}</b> | Đáp án đúng: <b>${item.cAns}</b>
                </div>`;
            });
            document.getElementById("review-area").innerHTML = html;
            if(window.MathJax) MathJax.typesetPromise();
        }

        window.viewHistory = async () => {
            const snap = await get(ref(db, `history_all/${currentUser.username}`));
            let h = ""; globalHistoryList = [];
            if(snap.exists()) {
                const data = snap.val();
                Object.keys(data).reverse().forEach(k => { 
                    globalHistoryList.push(data[k]); 
                    h += `<div class="history-card"><div>📅 ${data[k].date} [${data[k].examName}]<br><b>Điểm: ${data[k].score}</b></div><button class="btn btn-blue" style="width:auto; padding:8px 15px; margin:0;" onclick="showHDetail(${globalHistoryList.length-1})">Chi tiết</button></div>`; 
                });
            }
            document.getElementById("history-content").innerHTML = h || "Trống"; showScreen('screen-history');
        };

        window.showHDetail = (i) => { 
            let item = globalHistoryList[i]; 
            renderResultPage(item.details, item.score); 
            showScreen('screen-result'); 
        };
    </script>
</body>
</html>
