<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Toán cùng Thầy Hùng Anh</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; --border: #cbd5e1; }
        body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; display: flex; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 700px; border-top: 6px solid var(--primary); }
        .screen { display: none; }
        .active { display: block; }
        
        input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; margin-bottom: 10px; transition: 0.2s; color: white; }
        .btn-blue { background: #2563eb; } .btn-blue:hover { background: #1d4ed8; }
        .btn-green { background: #10b981; } .btn-green:hover { background: #059669; }
        .btn-gray { background: #475569; } .btn-gray:hover { background: #334155; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 20px; font-weight: bold; }
        .mcq-option { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid var(--border); border-radius: 8px; background: white; cursor: pointer; text-align: left; }
        .mcq-option.selected { border-color: var(--primary); background: #eff6ff; font-weight: bold; }
        .tf-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .tf-table th, .tf-table td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        .history-card { border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="screen-login" class="screen active" style="text-align: center;">
            <h2 style="color:var(--primary); margin-top:0;">LeHoang Education</h2>
            <p style="color:#64748b; margin-bottom:30px;">Hệ thống Học tập & Kiểm tra trực tuyến</p>
            <input type="text" id="loginUser" placeholder="Tên đăng nhập (Thầy giáo cấp)">
            <input type="password" id="loginPass" placeholder="Mật khẩu">
            <button class="btn btn-blue" id="btn-login" onclick="handleLogin()">ĐĂNG NHẬP</button>
        </div>

        <div id="screen-dashboard" class="screen" style="text-align: center;">
            <h2 id="welcome-text" style="color:var(--primary);"></h2>
            <p style="color:#64748b; margin-bottom:30px;">Em muốn làm gì hôm nay?</p>
            <button class="btn btn-blue" onclick="startMode('exam')">🔴 VÀO PHÒNG THI CHÍNH THỨC</button>
            <button class="btn btn-green" onclick="startMode('practice')">🟢 TỰ LUYỆN TOÁN</button>
            <button class="btn btn-gray" onclick="viewHistory()">🕒 XEM LỊCH SỬ TỰ LUYỆN</button>
            <button class="btn" style="background:#e2e8f0; color:#475569;" onclick="logout()">Đăng xuất</button>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="header-bar">
                <span id="quiz-title" style="color:var(--primary);"></span>
                <span id="question-count" style="background:#e2e8f0; padding:4px 12px; border-radius:20px;"></span>
            </div>
            <div id="question-text" style="font-size:18px; margin-bottom:20px; line-height:1.6;"></div>
            <div id="interactive-area" style="margin-bottom:30px;"></div>
            <button class="btn btn-blue" onclick="submitAnswer()" id="btn-next">LƯU & ĐẾN CÂU TIẾP THEO</button>
            <button class="btn btn-gray" onclick="showScreen('screen-dashboard')" style="margin-top:10px;">Thoát ra Menu</button>
        </div>

        <div id="screen-result" class="screen">
            <h2 style="text-align:center; color:#16a34a;">HOÀN THÀNH</h2>
            <div style="text-align:center; background:#f8fafc; border:2px dashed var(--primary); padding:20px; border-radius:12px; margin:20px 0;">
                <p style="margin:0;">Điểm số đạt được:</p>
                <strong id="score-text" style="font-size:40px; color:var(--primary);"></strong>
            </div>
            <div id="review-area"></div>
            <button class="btn btn-blue" onclick="showScreen('screen-dashboard')" style="margin-top:20px;">Trở về Menu Chính</button>
        </div>

        <div id="screen-history" class="screen">
            <h2 style="color:var(--primary);">Lịch sử tự luyện của em</h2>
            <div id="history-list"></div>
            <button class="btn btn-gray" onclick="showScreen('screen-dashboard')">Trở về Menu Chính</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            databaseURL: "https://phamhunganhquiz-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phamhunganhquiz",
            appId: "1:948379693019:web:a9acf119254d237018c1fe"
        };
        
        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getDatabase(app);
        } catch(e) {
            alert("Lỗi khởi tạo Firebase: Hãy kiểm tra lại đoạn mã Config!");
        }

        const examQuestions = [
            { type: "mcq", q: "Đạo hàm của \\( y = e^{2x} \\) là:", a: ["e^{2x}", "2e^{2x}", "1/2e^{2x}", "2xe^{2x}"], correct: 1, explanation: "Dùng công thức (e^u)' = u'.e^u" },
            { type: "short", q: "Giá trị lớn nhất của \\( y = -x^2 + 4x + 1 \\):", correct: "5", explanation: "Đỉnh Parabol tại x=2, y=5" }
        ];

        const practiceQuestions = [
            { type: "mcq", q: "Thể tích khối chóp có diện tích đáy B, cao h là:", a: ["Bh", "1/3Bh", "1/2Bh", "3Bh"], correct: 1, explanation: "V = 1/3.B.h" },
            { type: "tf", q: "Phương trình \\( \\sin x = 1 \\):", statements: [{text: "Có họ nghiệm x = π/2 + k2π", isTrue: true}, {text: "Vô nghiệm", isTrue: false}], explanation: "Sin x = 1 tại điểm cao nhất vòng tròn lượng giác." }
        ];

        let currentUser = null, currentMode = "", currentQList = [];
        let currentQ = 0, score = 0, selectedMcq = null, studentHistory = [];

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // ĐĂNG NHẬP (ĐÃ THÊM BẪY LỖI)
        window.handleLogin = async () => {
            const btn = document.getElementById("btn-login");
            try {
                const user = document.getElementById("loginUser").value.trim().toLowerCase();
                const pass = document.getElementById("loginPass").value.trim();
                if(!user || !pass) return alert("Vui lòng nhập đủ thông tin!");

                btn.innerText = "ĐANG TẢI...";
                btn.style.opacity = "0.7";

                const snap = await get(ref(db, 'accounts/' + user));
                
                if(!snap.exists()) {
                    btn.innerText = "ĐĂNG NHẬP"; btn.style.opacity = "1";
                    return alert("Tài khoản không tồn tại! Thầy giáo chưa tạo tài khoản này.");
                }
                
                const data = snap.val();
                if(data.password !== pass) {
                    btn.innerText = "ĐĂNG NHẬP"; btn.style.opacity = "1";
                    return alert("Sai mật khẩu!");
                }

                currentUser = { username: user, fullName: data.fullName };
                document.getElementById("welcome-text").innerText = `Chào em, ${data.fullName}!`;
                showScreen('screen-dashboard');
                
                btn.innerText = "ĐĂNG NHẬP"; btn.style.opacity = "1";

            } catch (error) {
                btn.innerText = "ĐĂNG NHẬP"; btn.style.opacity = "1";
                alert("Lỗi kết nối Firebase: " + error.message + "\n\n1. Kiểm tra lại kết nối mạng.\n2. Kiểm tra xem file thầy đã cập nhật lên GitHub chưa.");
                console.error(error);
            }
        };

        window.logout = () => { currentUser = null; showScreen('screen-login'); };

        window.startMode = async (mode) => {
            currentMode = mode;
            currentQList = mode === 'exam' ? examQuestions : practiceQuestions;
            document.getElementById("quiz-title").innerText = mode === 'exam' ? "🔴 THI CHÍNH THỨC" : "🟢 TỰ LUYỆN";
            
            if(mode === 'exam') {
                const code = prompt("Nhập MÃ PHÒNG THI (Thầy giáo cung cấp):");
                if(code !== "TOAN2026") return alert("Mã phòng sai!");
                currentQ = 0; score = 0; studentHistory = [];
                update(ref(db, `students/${currentUser.fullName}`), { status: "Đang làm", score: 0, totalQ: currentQList.length, detailAnswers: [] });
            } else {
                const snap = await get(ref(db, `practices_current/${currentUser.username}`));
                if(snap.exists() && snap.val().currentQ < currentQList.length && confirm("Em có 1 bài tự luyện đang làm dở. Làm tiếp không?")) {
                    const data = snap.val();
                    currentQ = data.currentQ; score = data.score; studentHistory = data.detailAnswers || [];
                } else {
                    currentQ = 0; score = 0; studentHistory = [];
                }
            }
            showScreen('screen-quiz');
            renderQuestion();
        };

        function renderQuestion() {
            const q = currentQList[currentQ];
            document.getElementById("question-count").innerText = `Câu ${currentQ+1}/${currentQList.length}`;
            document.getElementById("question-text").innerHTML = q.q;
            
            let html = "";
            if(q.type === "mcq") {
                selectedMcq = null;
                q.a.forEach((ans, i) => html += `<button class="mcq-option" id="mcq-${i}" onclick="selectMcq(${i})">${ans}</button>`);
            } else if(q.type === "tf") {
                html += `<table class="tf-table"><tr><th>Phát biểu</th><th>Đúng</th><th>Sai</th></tr>`;
                q.statements.forEach((s, i) => html += `<tr><td style="text-align:left;">${s.text}</td><td><input type="radio" name="tf-${i}" value="true"></td><td><input type="radio" name="tf-${i}" value="false"></td></tr>`);
                html += `</table>`;
            } else {
                html = `<div style="text-align:center;"><input type="text" id="short-ans" style="text-align:center; font-weight:bold; color:var(--primary); width:200px;" placeholder="Nhập đáp án..."></div>`;
            }
            document.getElementById("interactive-area").innerHTML = html;
            if(window.MathJax) MathJax.typesetPromise();
        }

        window.selectMcq = (i) => {
            selectedMcq = i;
            document.querySelectorAll('.mcq-option').forEach(b => b.classList.remove('selected'));
            document.getElementById(`mcq-${i}`).classList.add('selected');
        };

        window.submitAnswer = () => {
            const q = currentQList[currentQ];
            let earned = 0, sAnsText = "", cAnsText = "";

            if(q.type === "mcq") {
                if(selectedMcq === null) return alert("Chưa chọn đáp án!");
                sAnsText = q.a[selectedMcq]; cAnsText = q.a[q.correct];
                if(selectedMcq === q.correct) earned = 1;
            } else if(q.type === "tf") {
                let allChecked = true, correctParts = 0, sAnsArr = [], cAnsArr = [];
                q.statements.forEach((s, i) => {
                    const sel = document.querySelector(`input[name="tf-${i}"]:checked`)?.value;
                    if(!sel) allChecked = false;
                    else { if(sel === s.isTrue.toString()) correctParts++; sAnsArr.push(sel==="true"?"Đ":"S"); }
                    cAnsArr.push(s.isTrue?"Đ":"S");
                });
                if(!allChecked) return alert("Chọn Đ/S cho tất cả các ý!");
                earned = correctParts * 0.25;
                sAnsText = sAnsArr.join("|"); cAnsText = cAnsArr.join("|");
            } else {
                sAnsText = document.getElementById("short-ans").value.trim();
                if(sAnsText === "") return alert("Nhập đáp án!");
                cAnsText = q.correct;
                if(sAnsText.toLowerCase() === q.correct.toLowerCase()) earned = 1;
            }

            score += earned;
            studentHistory.push({ sAns: sAnsText, cAns: cAnsText, earned: earned });
            currentQ++;

            if(currentMode === 'exam') {
                update(ref(db, `students/${currentUser.fullName}`), { score: score, detailAnswers: studentHistory });
            } else {
                update(ref(db, `practices_current/${currentUser.username}`), { currentQ: currentQ, score: score, detailAnswers: studentHistory });
            }

            if(currentQ < currentQList.length) renderQuestion();
            else finishMode();
        };

        function finishMode() {
            if(currentMode === 'exam') {
                update(ref(db, `students/${currentUser.fullName}`), { status: "Hoàn thành" });
            } else {
                const dateStr = new Date().toLocaleString();
                push(ref(db, `practices_history/${currentUser.username}`), { date: dateStr, score: score, total: currentQList.length });
                set(ref(db, `practices_current/${currentUser.username}`), null);
            }

            document.getElementById("score-text").innerText = score;
            let reviewHtml = "";
            currentQList.forEach((q, i) => {
                let color = studentHistory[i].earned >= 1 ? "green" : "red";
                reviewHtml += `<div style="text-align:left; background:#f1f5f9; padding:15px; border-radius:8px; margin-bottom:15px;">
                    <p><b>Câu ${i+1}:</b> ${q.q}</p>
                    <p>Em điền: <span style="color:${color};font-weight:bold;">${studentHistory[i].sAns}</span> (Đáp án: ${studentHistory[i].cAns})</p>
                    <div style="background:#dcfce7; padding:10px; border-left:4px solid #16a34a;"><b>Giải:</b> ${q.explanation}</div>
                </div>`;
            });
            document.getElementById("review-area").innerHTML = reviewHtml;
            showScreen('screen-result');
            if(window.MathJax) MathJax.typesetPromise();
        }

        window.viewHistory = async () => {
            const snap = await get(ref(db, `practices_history/${currentUser.username}`));
            let html = "";
            if(!snap.exists()) {
                html = "<p style='color:#64748b;'>Em chưa hoàn thành bài tự luyện nào cả.</p>";
            } else {
                const data = snap.val();
                Object.values(data).forEach((item, index) => {
                    html += `<div class="history-card">
                        <b>Lần luyện tập ${index + 1}</b> - Thời gian: ${item.date} <br>
                        <span style="color:var(--primary); font-size:20px; font-weight:bold;">Điểm: ${item.score}/${item.total}</span>
                    </div>`;
                });
            }
            document.getElementById("history-list").innerHTML = html;
            showScreen('screen-history');
        };
    </script>
</body>
</html>
