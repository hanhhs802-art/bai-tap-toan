<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QUẢN LÝ GIÁO VIÊN - LEHOANG EDUCATION</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; padding: 20px; background: var(--bg); color: var(--text); margin: 0; }
        .dashboard { max-width: 1200px; margin: 0 auto 30px auto; background: var(--panel); padding: 25px; border-radius: 12px; border-top: 5px solid var(--primary); }
        h2 { color: #60a5fa; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        table { width: 100%; border-collapse: collapse; background: white; color: black; border-radius: 8px; overflow: hidden; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        th { background: var(--primary); color: white; font-size: 14px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; margin-right: 5px; }
        .btn-add { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .btn-edit { background: #f59e0b; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .status-on { color: #10b981; font-weight: bold; }
        .detail-view { background: #1e293b; padding: 25px; border-radius: 15px; display: none; margin-top: 20px; border: 1px solid var(--primary); }
        .tag-correct { color: #4ade80; font-weight: bold; }
        .tag-wrong { color: #f87171; font-weight: bold; }
        .tag-none { color: #94a3b8; font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2>🔑 Quản lý tài khoản học sinh</h2>
        <div style="display:flex; gap:10px; flex-wrap: wrap; margin-bottom: 20px;">
            <input type="text" id="accU" placeholder="Tên đăng nhập">
            <input type="text" id="accP" placeholder="Mật khẩu">
            <input type="text" id="accN" placeholder="Họ và tên thật">
            <button class="btn-add" onclick="createAcc()">+ TẠO TÀI KHOẢN</button>
        </div>
        <div style="max-height: 300px; overflow-y: auto;">
            <table>
                <thead>
                    <tr><th>Tên đăng nhập</th><th>Mật khẩu</th><th>Họ và Tên</th><th>Sửa</th><th>Xoá</th></tr>
                </thead>
                <tbody id="accBody"></tbody>
            </table>
        </div>
    </div>

    <div class="dashboard">
        <h2>📊 Giám sát thi & Luyện tập</h2>
        <div style="margin-bottom: 20px;">
            <select id="filterExam" onchange="renderMonitoring()"><option value="">-- Chọn đề để xem báo cáo --</option></select>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Học sinh (Xem chi tiết)</th>
                    <th>Trạng thái</th>
                    <th>Số lần thoát tab</th>
                    <th>Điểm số</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="monitorBody"></tbody>
        </table>
        
        <h2 style="margin-top: 40px;">📉 Thống kê lỗi sai theo câu</h2>
        <table>
            <thead>
                <tr><th>Câu số</th><th>Danh sách học sinh sai/chưa làm</th><th>Số lượng</th></tr>
            </thead>
            <tbody id="statsBody"></tbody>
        </table>

        <div class="detail-view" id="detailSection">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #334155; padding-bottom: 10px;">
                <h3 id="detailTitle" style="color:#93c5fd; margin:0;"></h3>
                <button class="btn-delete" onclick="document.getElementById('detailSection').style.display='none'">ĐÓNG</button>
            </div>
            <div id="detailContent" style="margin-top:20px; max-height: 500px; overflow-y: auto;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            databaseURL: "https://phamhunganhquiz-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phamhunganhquiz",
            appId: "1:948379693019:web:a9acf119254d237018c1fe"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let studentData = {};
        let examList = new Set();

        // 1. QUẢN LÝ TÀI KHOẢN
        window.createAcc = () => { 
            let u = document.getElementById("accU").value.trim().toLowerCase();
            let p = document.getElementById("accP").value.trim();
            let n = document.getElementById("accN").value.trim();
            if(u && p && n) {
                set(ref(db, 'accounts/' + u), { password: p, fullName: n });
                alert("Đã tạo tài khoản thành công!");
                document.getElementById("accU").value = ""; document.getElementById("accP").value = ""; document.getElementById("accN").value = "";
            } else alert("Vui lòng nhập đủ 3 thông tin!");
        };

        window.editAccount = async (oldUser) => {
            const snap = await get(ref(db, 'accounts/' + oldUser));
            if(snap.exists()){
                const d = snap.val();
                const newUser = prompt("Tên đăng nhập mới:", oldUser); if (newUser === null) return;
                const newPass = prompt("Mật khẩu mới:", d.password); if (newPass === null) return;
                const newName = prompt("Họ tên mới:", d.fullName); if (newName === null) return;

                if(newUser.toLowerCase() !== oldUser) {
                    await set(ref(db, 'accounts/' + newUser.toLowerCase()), { password: newPass, fullName: newName });
                    await remove(ref(db, 'accounts/' + oldUser));
                } else {
                    await update(ref(db, 'accounts/' + oldUser), { password: newPass, fullName: newName });
                }
                alert("Cập nhật thành công!");
            }
        };

        onValue(ref(db, 'accounts'), (snap) => {
            let html = ""; const data = snap.val();
            if(data) {
                Object.keys(data).forEach(u => {
                    html += `<tr><td><b>${u}</b></td><td>${data[u].password}</td><td>${data[u].fullName}</td>
                    <td><button class="btn-edit" onclick="editAccount('${u}')">Sửa</button></td>
                    <td><button class="btn-delete" onclick="if(confirm('Xoá tài khoản này?')) remove(ref(getDatabase(),'accounts/${u}'))">Xoá</button></td></tr>`;
                });
            }
            document.getElementById("accBody").innerHTML = html;
        });

        // 2. GIÁM SÁT THI
        onValue(ref(db, 'students'), (snap) => {
            studentData = snap.val() || {};
            const filter = document.getElementById("filterExam");
            const currentFilter = filter.value;
            
            Object.values(studentData).forEach(st => { if(st.examName) examList.add(st.examName); });
            
            let options = "<option value=''>-- Chọn đề để xem báo cáo --</option>";
            Array.from(examList).sort().forEach(ex => {
                options += `<option value="${ex}">${ex}</option>`;
            });
            filter.innerHTML = options;
            if(currentFilter) filter.value = currentFilter;
            renderMonitoring();
        });

        window.renderMonitoring = () => {
            const selectedExam = document.getElementById("filterExam").value;
            if(!selectedExam) {
                document.getElementById("monitorBody").innerHTML = "";
                document.getElementById("statsBody").innerHTML = "";
                return;
            }

            let studentsInExam = Object.keys(studentData).filter(name => studentData[name].examName === selectedExam);
            let maxQuestions = 0;
            studentsInExam.forEach(n => { if(studentData[n].totalQ > maxQuestions) maxQuestions = studentData[n].totalQ; });

            let monitorHtml = "";
            let wrongMap = new Array(maxQuestions).fill(null).map(() => []);

            studentsInExam.forEach(name => {
                const st = studentData[name];
                const cheatClass = (st.cheats >= 2) ? "color:red; font-weight:bold;" : "";
                
                monitorHtml += `<tr>
                    <td style="color:blue; cursor:pointer; text-align:left; font-weight:bold;" onclick="viewStudentDetail('${name}')">${name}</td>
                    <td>${st.status || "Chưa bắt đầu"}</td>
                    <td style="${cheatClass}">${st.cheats || 0} lần</td>
                    <td style="font-size:18px;"><b>${st.score || 0}</b></td>
                    <td><button class="btn-delete" onclick="deleteResult('${name}')">Xoá bài</button></td>
                </tr>`;

                const answers = st.detailAnswers || [];
                for(let i = 0; i < maxQuestions; i++) {
                    if(!answers[i] || answers[i].earned <= 0) {
                        wrongMap[i].push(name);
                    }
                }
            });
            document.getElementById("monitorBody").innerHTML = monitorHtml;

            let statsHtml = "";
            wrongMap.forEach((list, i) => {
                statsHtml += `<tr>
                    <td style="font-weight:bold;">Câu ${i+1}</td>
                    <td style="color:#ef4444; text-align:left;">${list.join(", ") || "Tất cả đều đúng"}</td>
                    <td><b>${list.length} em</b></td>
                </tr>`;
            });
            document.getElementById("statsBody").innerHTML = statsHtml;
        };

        window.viewStudentDetail = async (name) => {
    window.currentViewingStudentName = name; 
    const st = studentData[name];
    document.getElementById("detailSection").style.display = "block";
    document.getElementById("detailTitle").innerText = "CHI TIẾT BÀI LÀM: " + name;

    // 1. Bài làm hiện tại
    let html = "<h3>📌 Bài làm hiện tại:</h3><table><thead><tr><th>Câu</th><th>Kết quả</th><th>Học sinh chọn</th><th>Đáp án đúng</th></tr></thead><tbody>";
    if(st && st.detailAnswers) {
        st.detailAnswers.forEach((item, i) => {
            let tag = item.earned > 0 ? '<span class="tag-correct">✔ Đúng</span>' : (item.sAns === "Chưa làm" ? '<span class="tag-none">✘ (Bỏ trống)</span>' : '<span class="tag-wrong">✘ Sai</span>');
            html += `<tr><td><b>${i+1}</b></td><td>${tag}</td><td>${item.sAns}</td><td style="color:green; font-weight:bold;">${item.cAns}</td></tr>`;
        });
    } else { html += "<tr><td colspan='4'>Trống.</td></tr>"; }
    html += "</tbody></table>";

    // 2. Lịch sử bài làm
    const accSnap = await get(ref(db, 'accounts'));
    let username = "";
    if(accSnap.exists()){
        const accs = accSnap.val();
        username = Object.keys(accs).find(u => accs[u].fullName === name);
    }

    // Tiêu đề Lịch sử kèm nút XOÁ TẤT CẢ
    html += `<div style="display:flex; justify-content:space-between; align-items:center; margin-top:30px;">
                <h3 style="color:#f59e0b; margin:0;">🕒 Lịch sử bài làm cũ:</h3>
                ${username ? `<button class="btn-delete" style="background:#ef4444; font-size:12px;" onclick="deleteAllHistory('${username}')">💥 XOÁ HẾT LỊCH SỬ</button>` : ""}
             </div>`;
    
    if(username) {
        const histSnap = await get(ref(db, `history_all/${username}`));
        if(histSnap.exists()){
            const histData = histSnap.val();
            Object.keys(histData).reverse().forEach(key => {
                const h = histData[key];
                html += `<div style="background:#334155; padding:10px; border-radius:8px; margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
                    <span>📅 ${h.date} - <b>${h.examName}</b> - Điểm: <b style="color:#60a5fa">${h.score}</b></span>
                    <button class="btn-delete" style="padding:5px 8px; font-size:11px;" onclick="deleteHistoryEntry('${username}', '${key}')">Xoá mục này</button>
                </div>`;
            });
        } else { html += "<p>Chưa có lịch sử.</p>"; }
    }

    document.getElementById("detailContent").innerHTML = html;
    if(window.MathJax) MathJax.typesetPromise();
};
        // Dán thêm đoạn này vào trong phần script module
window.deleteResult = (name) => {
    if (confirm(`Thầy có chắc chắn muốn xoá kết quả của học sinh ${name} không?`)) {
        // Lưu ý: db và ref đã được thầy import ở đầu script rồi nên dùng luôn
        const studentRef = ref(db, 'students/' + name);
        remove(studentRef)
            .then(() => {
                alert("Đã xoá bài làm thành công!");
                renderMonitoring(); // Gọi lại hàm này để bảng biến mất dòng vừa xoá
            })
            .catch((error) => {
                alert("Lỗi: " + error.message);
            });
    }
};
// Hàm xoá 1 mục lịch sử cụ thể
window.deleteHistoryEntry = (username, historyKey) => {
    if (confirm("Thầy có chắc chắn muốn xoá bản ghi lịch sử này không?")) {
        const historyRef = ref(db, `history_all/${username}/${historyKey}`);
        remove(historyRef)
            .then(() => {
                alert("Đã xoá lịch sử thành công!");
                // Sau khi xoá xong, gọi lại hàm xem chi tiết để cập nhật lại danh sách
                viewStudentDetail(window.currentViewingStudentName); 
            })
            .catch((err) => alert("Lỗi: " + err.message));
    }
};
// Hàm xoá TOÀN BỘ lịch sử của 1 học sinh
window.deleteAllHistory = (username) => {
    if (confirm("CẢNH BÁO: Thầy có chắc chắn muốn xoá VĨNH VIỄN TOÀN BỘ lịch sử bài làm của học sinh này không?")) {
        const allHistoryRef = ref(db, `history_all/${username}`);
        remove(allHistoryRef)
            .then(() => {
                alert("Đã xoá sạch toàn bộ lịch sử!");
                viewStudentDetail(window.currentViewingStudentName); // Tải lại bảng để cập nhật
            })
            .catch((err) => alert("Lỗi: " + err.message));
    }
};
    </script>
</body>
</html>
