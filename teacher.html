<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HỆ THỐNG GIÁM SÁT - THẦY HÙNG ANH</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 20px; background: var(--bg); color: var(--text); margin: 0; }
        h1 { color: #60a5fa; text-align: center; margin-bottom: 5px; font-size: 26px; text-transform: uppercase; }
        .header-sub { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
        
        .dashboard { max-width: 1000px; margin: 0 auto; background: var(--panel); padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-top: 5px solid var(--primary); }
        
        table { width: 100%; border-collapse: collapse; background: white; color: black; border-radius: 8px; overflow: hidden; }
        th, td { padding: 16px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        th { background: var(--primary); color: white; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        tr:hover { background-color: #f8fafc; }
        
        .warning { color: #dc2626; font-weight: bold; background-color: #fee2e2; border-radius: 6px; padding: 6px 12px; }
        .online { color: #16a34a; font-weight: bold; }
        .done { color: #64748b; font-style: italic; }
        .score-badge { background: #dbeafe; color: #1d4ed8; padding: 8px 16px; border-radius: 8px; font-weight: bold; font-size: 18px; display: inline-block; min-width: 40px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>📋 Phòng Giám Sát Thi Trực Tuyến</h1>
        <div class="header-sub" id="stats">Đang kết nối tới máy chủ...</div>
        
        <table id="studentTable">
            <thead>
                <tr>
                    <th style="text-align: left; padding-left: 20px;">Họ tên thí sinh</th>
                    <th>Trạng thái</th>
                    <th>Tiến độ</th>
                    <th>Cảnh báo (Chuyển tab)</th>
                    <th>Tổng điểm</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Cấu hình Firebase của thầy
        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            projectId: "phamhunganhquiz",
            storageBucket: "phamhunganhquiz.firebasestorage.app",
            messagingSenderId: "948379693019",
            appId: "1:948379693019:web:a9acf119254d237018c1fe",
            measurementId: "G-WZLRBGPF4H"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'students'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            document.getElementById("stats").innerText = `Cập nhật trực tiếp lúc: ${new Date().toLocaleTimeString()} - Kết nối ổn định 🟢`;
            
            if (!data) {
                tbody.innerHTML = "<tr><td colspan='5' style='padding: 40px; color: #64748b;'>Chưa có thí sinh nào vào phòng thi...</td></tr>";
                return;
            }

            Object.keys(data).forEach(name => {
                const info = data[name];
                
                // Xử lý hiển thị trạng thái
                let statusClass = info.status === 'Đang làm' ? 'online' : (info.status === 'Hoàn thành' ? 'done' : '');
                
                // Xử lý hiển thị cảnh báo
                let cheatHtml = info.cheats > 0 ? `<span class="warning">${info.cheats} lần</span>` : `<span style="color:#cbd5e1">-</span>`;
                
                // Xử lý hiển thị điểm số (Hiển thị số thập phân cực đẹp)
                let scoreHtml = '<span style="color:#94a3b8">Đang thi...</span>';
                if (info.status === 'Hoàn thành' || info.score > 0) {
                    scoreHtml = `<span class="score-badge">${info.score}</span>`;
                }

                const row = `<tr>
                    <td style="text-align: left; padding-left: 20px; font-weight: bold; font-size: 16px; color: #0f172a;">${name}</td>
                    <td class="${statusClass}">${info.status}</td>
                    <td>${info.status === 'Hoàn thành' ? 'Đã nộp bài' : 'Câu ' + info.question}</td>
                    <td>${cheatHtml}</td>
                    <td>${scoreHtml}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        });
    </script>
</body>
</html>
