<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GIÁM SÁT - THẦY HÙNG ANH</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .dashboard { max-width: 1100px; margin: auto; background: #1e293b; padding: 25px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #2563eb; color: white; }
        .right { color: green; font-weight: bold; }
        .wrong { color: red; font-weight: bold; }
        .detail-card { background: #334155; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #2563eb; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>📊 TIẾN ĐỘ THI THỜI GIAN THỰC</h1>
        <div id="status">Kết nối...</div>
        <table id="matrixTable"><thead><tr id="hRow"></tr></thead><tbody id="bRow"></tbody></table>

        <div class="detail-card" id="detailView">
            <h3>🔍 CHI TIẾT BÀI LÀM (Bấm vào tên học sinh để xem)</h3>
            <div id="detailContent">Hãy chọn một học sinh để xem chi tiết đáp án...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            databaseURL: "https://phamhunganhquiz-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phamhunganhquiz",
            appId: "1:948379693019:web:a9acf119254d237018c1fe"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'students'), (snap) => {
            const data = snap.val();
            if(!data) return;
            document.getElementById("status").innerText = "Đang kết nối 🟢";
            
            let maxQ = 0;
            Object.values(data).forEach(s => if(s.totalQ > maxQ) maxQ = s.totalQ);

            let h = `<th>Thí sinh</th><th>Điểm</th>`;
            for(let i=1; i<=maxQ; i++) h += `<th>C${i}</th>`;
            document.getElementById("hRow").innerHTML = h;

            let b = "";
            Object.keys(data).forEach(name => {
                const s = data[name];
                b += `<tr><td style="cursor:pointer; color:blue;" onclick="view('${name}')">${name}</td><td><b>${s.score}</b></td>`;
                for(let i=0; i<maxQ; i++) {
                    const ans = s.detailAnswers ? s.detailAnswers[i] : null;
                    if(!ans) b += `<td>-</td>`;
                    else b += `<td class="${ans.earned >= 1 ? 'right' : 'wrong'}">${ans.earned >= 1 ? '✔' : '✘'}</td>`;
                }
                b += `</tr>`;
            });
            document.getElementById("bRow").innerHTML = b;

            // Hàm xem chi tiết
            window.view = (name) => {
                const s = data[name];
                let html = `<b>Học sinh: ${name}</b><table style="margin-top:10px;"><tr><th>Câu</th><th>Trò điền</th><th>Đáp án đúng</th></tr>`;
                s.detailAnswers.forEach((a, i) => {
                    html += `<tr><td>${i+1}</td><td>${a.sAns}</td><td style="color:green">${a.cAns}</td></tr>`;
                });
                html += `</table>`;
                document.getElementById("detailContent").innerHTML = html;
            };
        });
    </script>
</body>
</html>
