<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HỆ THỐNG GIÁM SÁT & QUẢN LÝ - THẦY HÙNG ANH</title>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; }
        body { font-family: Arial, sans-serif; padding: 20px; background: var(--bg); color: var(--text); margin: 0; }
        h1 { color: #60a5fa; text-align: center; margin-bottom: 5px; font-size: 24px; }
        .dashboard { max-width: 1200px; margin: 0 auto; background: var(--panel); padding: 25px; border-radius: 12px; border-top: 5px solid var(--primary); margin-bottom: 20px; }
        .account-box { background: #334155; padding: 20px; border-radius: 8px; border-left: 5px solid #10b981; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #64748b; background: #0f172a; color: white; }
        button { padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; background: #10b981; color: white; }
        button:hover { background: #059669; }
        table { width: 100%; border-collapse: collapse; background: white; color: black; border-radius: 8px; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        th { background: var(--primary); color: white; }
        .detail-card { background: #334155; padding: 20px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #3b82f6; display: none; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2 style="margin-top:0; color:#10b981;">👨‍🏫 QUẢN LÝ TÀI KHOẢN HỌC SINH</h2>
        <div class="account-box">
            <input type="text" id="accUsername" placeholder="Tên đăng nhập (VD: HS01)">
            <input type="text" id="accPassword" placeholder="Mật khẩu (VD: 1234)">
            <input type="text" id="accFullName" placeholder="Họ và tên thật (VD: Nguyễn Văn A)" style="width: 250px;">
            <button onclick="createAccount()">+ TẠO / CẬP NHẬT TÀI KHOẢN</button>
        </div>
        <p id="accMsg" style="color:#4ade80; font-size:14px; display:none;">Đã tạo tài khoản thành công!</p>
    </div>

    <div class="dashboard">
        <h2 style="margin-top:0; color:#60a5fa;">📊 MA TRẬN PHÒNG THI CHÍNH THỨC</h2>
        <p id="conn-status" style="color: #94a3b8; font-size: 14px;">Đang kết nối...</p>
        <div style="overflow-x: auto;">
            <table id="studentTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="detail-card" id="detailView">
            <h3 id="detailTitle" style="color: #93c5fd; margin-top:0;">🔍 CHI TIẾT BÀI LÀM</h3>
            <table style="width:100%; background:#1e293b; color:white;">
                <thead style="background:#475569;"><tr><th>Câu</th><th>Học sinh điền</th><th>Đáp án chuẩn</th></tr></thead>
                <tbody id="detailBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB79zEH0-xkYJ9mfxghaEDzNQowlhx0MXE",
            authDomain: "phamhunganhquiz.firebaseapp.com",
            databaseURL: "https://phamhunganhquiz-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "phamhunganhquiz",
            appId: "1:948379693019:web:a9acf119254d237018c1fe"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let globalData = null;

        // TẠO TÀI KHOẢN
        window.createAccount = () => {
            const user = document.getElementById("accUsername").value.trim().toLowerCase();
            const pass = document.getElementById("accPassword").value.trim();
            const name = document.getElementById("accFullName").value.trim();
            
            if(!user || !pass || !name) return alert("Thầy vui lòng điền đủ 3 ô thông tin!");
            
            set(ref(db, 'accounts/' + user), { password: pass, fullName: name })
            .then(() => {
                const msg = document.getElementById("accMsg");
                msg.style.display = "block";
                setTimeout(() => msg.style.display = "none", 3000);
                document.getElementById("accUsername").value = "";
                document.getElementById("accPassword").value = "";
                document.getElementById("accFullName").value = "";
            });
        };

        // HIỂN THỊ MA TRẬN THI (Giữ nguyên như cũ)
        onValue(ref(db, 'students'), (snapshot) => {
            globalData = snapshot.val();
            document.getElementById("conn-status").innerText = "Kết nối ổn định 🟢";
            const thead = document.getElementById("tableHead"), tbody = document.getElementById("tableBody");
            
            if (!globalData) return tbody.innerHTML = "<tr><td style='padding:20px;'>Chưa có thí sinh...</td></tr>";

            let maxQ = 0;
            Object.values(globalData).forEach(s => { if (s.totalQ > maxQ) maxQ = s.totalQ; });
            
            let h = `<tr><th style="min-width:150px;">Họ tên (Bấm để xem)</th><th>Điểm</th>`;
            for(let i=1; i<=maxQ; i++) h += `<th>C${i}</th>`;
            thead.innerHTML = h + `</tr>`;

            tbody.innerHTML = "";
            Object.keys(globalData).forEach(name => {
                const info = globalData[name];
                let row = `<tr>
                    <td style="text-align:left; font-weight:bold; color:#1d4ed8; cursor:pointer;" onclick="viewDetail('${name}')">${name} <br><span style="font-size:11px; color:#64748b;">${info.status}</span></td>
                    <td><b>${info.status === 'Đang làm' ? '...' : info.score}</b></td>`;
                const ans = info.detailAnswers || [];
                for(let i=0; i<maxQ; i++) {
                    if (i < ans.length) {
                        let e = ans[i].earned;
                        row += `<td style="color:${e>=1?'green':(e===0?'red':'orange')}; font-weight:bold;">${e>=1?'✔':(e===0?'✘':'O')}</td>`;
                    } else row += `<td style="color:#cbd5e1">...</td>`;
                }
                tbody.innerHTML += row + `</tr>`;
            });
        });

        window.viewDetail = (name) => {
            if (!globalData || !globalData[name] || !globalData[name].detailAnswers) return alert("Chưa có dữ liệu bài làm!");
            const s = globalData[name];
            document.getElementById("detailView").style.display = "block";
            document.getElementById("detailTitle").innerText = `🔍 BÀI LÀM: ${name}`;
            let b = "";
            s.detailAnswers.forEach((ans, i) => {
                let color = ans.earned >= 1 ? "#4ade80" : "#f87171";
                b += `<tr><td style="text-align:center;">Câu ${i+1}</td><td style="color:${color}; text-align:center;">${ans.sAns}</td><td style="color:#4ade80; text-align:center;">${ans.cAns}</td></tr>`;
            });
            document.getElementById("detailBody").innerHTML = b;
            document.getElementById("detailView").scrollIntoView({ behavior: 'smooth' });
        };
    </script>
</body>
</html>
